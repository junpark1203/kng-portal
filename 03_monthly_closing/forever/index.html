<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거래원장 분석 프로그램</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>월마감 거래원장 분석기</h1>
      <p>엑셀 파일을 업로드하면 현장명 기준으로 자동 분개됩니다.</p>
    </header>

    <main>
      <section class="upload-section glass-panel">
        <div class="upload-area" id="uploadArea">
          <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
          </svg>
          <h3>거래원장 업로드</h3>
          <p>클릭하여 엑셀 파일(.xlsx, .xls)을 선택하거나 이곳으로 드래그 하세요.</p>
          <input type="file" id="fileInput" accept=".xlsx, .xls" hidden>
          <button class="btn-primary" onclick="document.getElementById('fileInput').click()">파일 선택</button>
        </div>
      </section>

      <section class="results-section" id="resultsSection" style="display: none;">
        <div class="results-header">
          <h2>현장별 분개 결과</h2>
          <div class="stats" id="statsArea"></div>
        </div>
        <div id="sitesContainer" class="sites-container"></div>
      </section>
    </main>
  </div>

  <!-- 현장 상세 팝업 모달 -->
  <div id="siteModal" class="site-modal-overlay" style="display:none;" onclick="if(event.target===this) window.closeSiteModal()">
    <div class="site-modal">
      <div class="site-modal-header">
        <h3 id="siteModalTitle">현장명</h3>
        <button class="site-modal-close" onclick="window.closeSiteModal()">&times;</button>
      </div>
      <div class="site-modal-body" id="siteModalBody"></div>
    </div>
  </div>

  <div id="floatingActionBar" class="floating-action-bar">
    <div class="floating-content">
      <!-- 구역 1: 상태 -->
      <div class="floating-zone">
        <span id="floatingSelectedCount" class="floating-text">0건 선택됨</span>
        <button class="floating-clear-btn" onclick="window.clearSelection()" title="선택한 항목을 모두 해제합니다">✕ 선택 해제</button>
      </div>

      <div class="floating-divider"></div>

      <!-- 구역 3: 분류 일괄 지정 -->
      <div class="floating-zone">
        <span class="floating-label">분류 지정:</span>
        <select id="bulkCategorySelect" class="form-select" onchange="window.handleBulkCategorySelect()">
          <!-- app.js에서 동적 주입 -->
        </select>
        <input type="text" id="customBulkCategory" class="form-input" placeholder="직접 입력" style="display:none;" />
        <button class="btn-primary" style="margin-left: 0.5rem" onclick="window.executeBulkCategory()">적용</button>
      </div>

      <div class="floating-divider"></div>

      <!-- 구역 2: 삭제 -->
      <div class="floating-zone">
        <button class="btn-danger" onclick="window.executeDelete()">🗑 삭제</button>
      </div>

      <!-- 구역 4: 이동 -->
      <div class="floating-zone">
        <span class="floating-label">이동 →</span>
        <select id="moveSiteSelect" class="form-select" onchange="window.handleFloatingSelectChange()"></select>
        <input type="text" id="customMoveSiteName" class="form-input" placeholder="새 현장명 입력" style="display:none;" />
        <button class="btn-primary" onclick="window.executeMove()">이동</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
