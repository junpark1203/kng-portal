services:
  kng-server:
    image: ghcr.io/junpark1203/kng-inventory-server:latest
    container_name: kng_inventory_server
    restart: always
    environment:
      - UPLOAD_DIR=/usr/src/app/uploads
      - IMG_BASE_URL=https://ss-upload-img.junparks.com
    volumes:
      - ./data:/usr/src/app/data
      - ./public:/usr/src/app/public
      - /volume1/docker/upload_images/smart_store:/usr/src/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.scope=kng-inventory"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kng_cloudflared
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      kng-server:
        condition: service_healthy

  watchtower:
    image: containrrr/watchtower
    container_name: kng_watchtower
    restart: always
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCOPE=kng-inventory
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "com.centurylinklabs.watchtower.scope=kng-inventory"
