<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="K&G 본사 매입 현황 — 입출고 등록">
    <title>입출고 등록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .main-content { margin-left: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }

        /* ── Container Card ── */
        .entry-container { background: var(--surface); width: 100%; overflow: hidden; }
        .entry-header-bar { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, var(--primary) 0%, #1a2d7a 100%); color: #fff; }
        .entry-header-bar.out-mode { background: linear-gradient(135deg, #b45309 0%, #92400e 100%); }
        .entry-header-bar h2 { font-size: 18px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px; letter-spacing: -.3px; }
        .entry-header-bar h2 i { font-size: 22px; opacity: .85; }

        /* ── Toggle ── */
        .toggle-group { display: flex; gap: 2px; background: rgba(255,255,255,.15); padding: 3px; border-radius: 8px; backdrop-filter: blur(4px); }
        .toggle-label { padding: 7px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; color: rgba(255,255,255,.7); transition: all .2s; display: flex; align-items: center; gap: 5px; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .toggle-label { background: #fff; color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,.15); }
        .out-mode input[type="radio"]:checked + .toggle-label { color: #92400e; }

        /* ── Step Info Bar ── */
        .step-bar { padding: 12px 20px; display: flex; gap: 12px; border-bottom: 1px solid var(--border); background: var(--gray-50); flex-wrap: wrap; align-items: flex-end; }
        .fg-inline { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
        .fg-inline label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; }
        .fg-inline input { padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--surface); outline: none; transition: all .15s; color: var(--gray-800); }
        .fg-inline input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-muted); }

        /* ── Table ── */
        .table-wrap { padding: 0 20px 8px; }
        .invoice-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 16px; }
        .invoice-table thead th { position: sticky; top: 0; background: var(--gray-50); font-weight: 700; font-size: 11px; color: var(--gray-500); text-align: center; text-transform: uppercase; letter-spacing: .3px; padding: 10px 8px; border-bottom: 2px solid var(--border); }
        .invoice-table thead th:first-child { border-radius: var(--radius) 0 0 0; }
        .invoice-table thead th:last-child { border-radius: 0 var(--radius) 0 0; }
        .invoice-table tbody tr { transition: background .1s; }
        .invoice-table tbody tr:hover { background: var(--gray-50); }
        .invoice-table tbody td { padding: 4px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .invoice-table tbody td input, .invoice-table tbody td select { width: 100%; padding: 8px 10px; border: 1px solid transparent; border-radius: var(--radius); font-size: 13px; outline: none; background: transparent; text-align: center; transition: all .15s; color: var(--gray-800); }
        .invoice-table tbody td input.text-left, .invoice-table tbody td select { text-align: left; }
        .invoice-table tbody td input:focus, .invoice-table tbody td select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px var(--primary-muted); }
        .invoice-table tbody td input:hover, .invoice-table tbody td select:hover { border-color: var(--gray-300); }
        .invoice-table tbody td input.readonly-input { color: var(--gray-500); cursor: not-allowed; background: var(--gray-50); }

        .row-num { width: 36px; text-align: center; font-weight: 700; font-size: 12px; color: var(--gray-400); }
        .col-qty { width: 75px; }
        .col-price { width: 105px; }
        .col-action { width: 44px; }
        .col-stock { width: 65px; }

        .btn-icon { background: transparent; border: none; color: var(--gray-400); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 4px; transition: all .15s; }
        .btn-icon:hover { color: var(--danger); background: var(--danger-muted); }

        /* ── Stock Badge ── */
        .stock-badge { font-size: 12px; font-weight: 700; text-align: center; padding: 4px; border-radius: 4px; }
        .stock-badge.ok { color: var(--success); background: var(--success-muted); }
        .stock-badge.low { color: var(--warning); background: var(--warning-muted); }
        .stock-badge.zero { color: var(--danger); background: var(--danger-muted); }

        /* ── VAT Toggle ── */
        .vat-toggle { font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 3px; color: var(--gray-400); cursor: pointer; margin-top: 2px; }
        .vat-toggle input { margin: 0; width: 12px; height: 12px; accent-color: var(--primary); cursor: pointer; }

        /* ── Add Row ── */
        .btn-add-row { width: calc(100% - 40px); margin: 0 20px 12px; padding: 8px; background: transparent; color: var(--gray-500); border: 2px dashed var(--gray-200); border-radius: var(--radius); font-weight: 600; font-size: 13px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-add-row:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-muted); }

        /* ── Footer ── */
        .entry-footer { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--gray-50); display: flex; justify-content: space-between; align-items: center; }
        .summary-info { display: flex; gap: 24px; align-items: center; }
        .summary-chip { font-size: 13px; color: var(--gray-600); display: flex; align-items: center; gap: 6px; }
        .summary-chip strong { font-size: 16px; font-weight: 800; color: var(--primary); }
        .footer-actions { display: flex; gap: 10px; }
        .btn-submit { padding: 10px 28px; background: var(--primary); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .2s; letter-spacing: -.2px; }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(44,62,143,.25); }
        .btn-submit.out-mode { background: #b45309; }
        .btn-submit.out-mode:hover { background: #92400e; box-shadow: 0 4px 12px rgba(180,83,9,.25); }
        .btn-reset { padding: 10px 20px; background: var(--surface); color: var(--gray-600); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
        .btn-reset:hover { background: var(--gray-100); color: var(--gray-800); }

        /* ── Autocomplete ── */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; min-width: 280px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 100; max-height: 220px; overflow-y: auto; display: none; }
        .autocomplete-item { padding: 10px 14px; cursor: pointer; font-size: 12px; border-bottom: 1px solid var(--gray-100); text-align: left; display: flex; justify-content: space-between; align-items: center; transition: background .1s; }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover, .autocomplete-item.active { background: var(--primary-muted); }
        .ac-name { font-weight: 600; color: var(--gray-800); }
        .ac-detail { font-size: 11px; color: var(--gray-500); }
        .ac-stock { font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: var(--success-muted); color: var(--success); }

        /* ── OUT Mode Select ── */
        .out-select { padding: 8px 10px; border: 1px solid transparent; border-radius: var(--radius); font-size: 13px; background: transparent; cursor: pointer; color: var(--gray-800); appearance: none; -webkit-appearance: none; }
        .out-select:focus { border-color: #b45309; box-shadow: 0 0 0 3px rgba(180,83,9,.12); background: #fff; }

        /* ── Mode Indicator ── */
        .mode-indicator { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: .3px; }
        .mode-indicator.in { background: rgba(255,255,255,.2); color: rgba(255,255,255,.9); }
        .mode-indicator.out { background: rgba(255,255,255,.2); color: rgba(255,255,255,.9); }

        @media (max-width: 1024px) {
            .invoice-table { display: block; overflow-x: auto; white-space: nowrap; }
            .step-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="mainApp">
        <main class="main-content">
            <div class="entry-container">
                <form id="entryForm" autocomplete="off">
                    <div class="entry-header-bar" id="headerBar">
                        <div style="display:flex;align-items:center;gap:12px;">
                            <h2><i class='bx bx-package'></i> 입출고 등록</h2>
                            <span class="mode-indicator in" id="modeIndicator"><i class='bx bx-down-arrow-circle'></i> 매입 모드</span>
                        </div>
                        <div class="toggle-group">
                            <input type="radio" id="typeIn" name="txType" value="IN" checked>
                            <label for="typeIn" class="toggle-label"><i class='bx bx-down-arrow-circle'></i> 매입</label>
                            <input type="radio" id="typeOut" name="txType" value="OUT">
                            <label for="typeOut" class="toggle-label"><i class='bx bx-up-arrow-circle'></i> 출고</label>
                        </div>
                    </div>

                    <div class="step-bar">
                        <div class="fg-inline" style="flex: 0 0 150px;"><label>일자</label><input type="date" id="txDate" required></div>
                        <div class="fg-inline" style="flex: 0 0 180px;"><label>공급사 / 출고처</label><input type="text" id="fSupplier" required placeholder="공급사명 입력"></div>
                        <div class="fg-inline" style="flex: 2;"><label>비고</label><input type="text" id="txRemarks" placeholder="전체 항목에 적용될 메모 (선택)"></div>
                    </div>

                    <div class="table-wrap">
                        <table class="invoice-table" id="itemsTable">
                            <thead id="tableHead">
                                <!-- populated by JS -->
                            </thead>
                            <tbody id="itemsBody">
                                <!-- Rows will be added dynamically -->
                            </tbody>
                        </table>
                    </div>

                    <button type="button" class="btn-add-row" id="btnAddRow"><i class='bx bx-plus'></i> 상품 행 추가</button>

                    <div class="entry-footer">
                        <div class="summary-info">
                            <div class="summary-chip"><i class='bx bx-box' style="font-size:18px;color:var(--gray-400)"></i> 등록 대기 <strong id="summaryRows">0</strong> 건</div>
                            <div class="summary-chip" id="summaryTotalWrap" style="display:none;">총액 <strong id="summaryTotal">0</strong> 원</div>
                        </div>
                        <div class="footer-actions">
                            <button type="button" class="btn-reset" id="resetEntry"><i class='bx bx-reset'></i> 초기화</button>
                            <button type="submit" class="btn-submit" id="submitBtn"><i class='bx bx-check'></i> 일괄 등록</button>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="hq-entry.js"></script>
</body>
</html>
