<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="K&G 본사 매입 현황 — 입출고 등록">
    <title>입출고 등록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .main-content { margin-left: 0; padding: 20px; display: flex; justify-content: center; }
        .entry-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 100%; max-width: 1200px; box-shadow: var(--shadow-sm); }
        .entry-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
        .entry-header h2 { font-size: 20px; font-weight: 700; color: var(--gray-900); margin: 0; display: flex; align-items: center; gap: 8px; }
        .entry-header h2 i { color: var(--primary); font-size: 24px; }
        
        .toggle-group { display: flex; gap: 4px; background: var(--surface-container-lowest); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
        .toggle-label { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; color: var(--gray-600); transition: all var(--transition-fast); }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .toggle-label { background: var(--primary); color: white; box-shadow: 0 2px 4px rgba(44, 62, 143, 0.25); }

        .common-info-bar { display: flex; gap: 16px; align-items: center; background: var(--surface-container-low); padding: 16px; border-radius: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .fg-inline { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 150px; }
        .fg-inline label { font-size: 12px; font-weight: 600; color: var(--gray-700); }
        .fg-inline input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--surface); outline: none; }
        .fg-inline input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-muted); }

        .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
        .invoice-table th, .invoice-table td { padding: 8px; border: 1px solid var(--border); }
        .invoice-table th { background: var(--surface-container-low); font-weight: 600; font-size: 12px; color: var(--gray-600); text-align: center; }
        .invoice-table td input { width: 100%; padding: 8px; border: 1px solid transparent; border-radius: 4px; font-size: 13px; outline: none; background: transparent; text-align: center; }
        .invoice-table td input.text-left { text-align: left; }
        .invoice-table td input:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 2px var(--primary-muted); }
        .invoice-table td input.readonly-input { color: var(--gray-500); cursor: not-allowed; }
        
        .btn-icon { background: transparent; border: none; color: var(--gray-400); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .btn-icon:hover { color: var(--danger); }
        
        .btn-add-row { width: 100%; padding: 12px; background: transparent; color: var(--gray-600); border: 1px dashed var(--border); border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all var(--transition-fast); margin-bottom: 24px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-add-row:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-muted); }

        .form-actions { display: flex; justify-content: flex-end; gap: 12px; padding-top: 20px; border-top: 1px solid var(--border); }
        .btn-submit { padding: 10px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all var(--transition-fast); }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
        .btn-reset { padding: 10px 20px; background: var(--surface); color: var(--gray-600); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--transition-fast); }
        .btn-reset:hover { background: var(--gray-100); color: var(--gray-800); }

        .summary-bar { font-size: 14px; font-weight: 700; color: var(--gray-800); display: flex; align-items: center; gap: 16px; margin-bottom: 16px; justify-content: flex-end; }
        .summary-val { color: var(--primary); font-size: 16px; }

        /* Autocomplete styles */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-list { position: absolute; top: 100%; left: 0; min-width: 250px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; box-shadow: var(--shadow-md); z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
        .autocomplete-item { padding: 8px 12px; cursor: pointer; font-size: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover, .autocomplete-item.active { background: var(--primary-muted); color: var(--primary); font-weight: 600; }

        .vat-toggle { font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 4px; color: var(--gray-500); cursor: pointer; margin-top: 4px; }
        .vat-toggle input { margin: 0; width: auto; height: auto; cursor: pointer; }

        .col-qty { width: 80px; }
        .col-price { width: 110px; }
        .col-action { width: 50px; }

        @media (max-width: 1024px) {
            .invoice-table { display: block; overflow-x: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="mainApp">
        <main class="main-content">
            <div class="entry-container">
                <form id="entryForm" autocomplete="off">
                    <div class="entry-header">
                        <h2><i class='bx bx-edit'></i> 일괄 입출고 등록</h2>
                        <div class="toggle-group">
                            <input type="radio" id="typeIn" name="txType" value="IN" checked>
                            <label for="typeIn" class="toggle-label"><i class='bx bx-down-arrow-circle'></i> 매입 (IN)</label>
                            <input type="radio" id="typeOut" name="txType" value="OUT">
                            <label for="typeOut" class="toggle-label"><i class='bx bx-up-arrow-circle'></i> 출고 (OUT)</label>
                        </div>
                    </div>

                    <div class="common-info-bar">
                        <div class="fg-inline" style="flex: 0 0 150px;"><label for="txDate">일자</label><input type="date" id="txDate" required></div>
                        <div class="fg-inline"><label for="fSupplier">공급사</label><input type="text" id="fSupplier" required placeholder="최가유통"></div>
                        <div class="fg-inline" style="flex: 2;"><label for="txRemarks">공통 비고</label><input type="text" id="txRemarks" placeholder="전체 항목에 적용될 메모 입력"></div>
                    </div>

                    <table class="invoice-table" id="itemsTable">
                        <thead>
                            <tr>
                                <th>브랜드</th>
                                <th>상품명 (입력시 자동완성)</th>
                                <th>컬러</th>
                                <th>사이즈</th>
                                <th class="col-qty">수량</th>
                                <th class="col-price" class="in-only-th">상품가<label class="vat-toggle"><input type="checkbox" class="col-vat-check" data-target="basePrice" checked>VAT별도</label></th>
                                <th class="col-price" class="in-only-th">운임<label class="vat-toggle"><input type="checkbox" class="col-vat-check" data-target="freight" checked>VAT별도</label></th>
                                <th class="col-price">단가</th>
                                <th class="col-action">삭제</th>
                            </tr>
                        </thead>
                        <tbody id="itemsBody">
                            <!-- Rows will be added dynamically -->
                        </tbody>
                    </table>

                    <button type="button" class="btn-add-row" id="btnAddRow"><i class='bx bx-plus'></i> 상품 행 추가</button>

                    <div class="summary-bar">
                        총 <span class="summary-val" id="summaryQty">0</span>건 등록 대기중
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-reset" id="resetEntry"><i class='bx bx-reset'></i> 초기화</button>
                        <button type="submit" class="btn-submit"><i class='bx bx-check'></i> 일괄 등록하기</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="hq-entry.js"></script>
</body>
</html>
