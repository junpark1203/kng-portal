<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="K&G 본사 매입 현황 — 실시간 재고">
    <title>실시간 재고 현황</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../Common/css/search-engine.css">
    <style>.main-content { margin-left: 0; }</style>
</head>
<body>
    <div class="app-container" id="mainApp">
        <main class="main-content">
            <div class="page-body">
                <!-- KPI Strip -->
                <div class="kpi-strip" id="kpiStrip">
                    <div class="kpi-card">
                        <div class="kpi-icon kpi-stock"><i class='bx bx-package'></i></div>
                        <div class="kpi-data"><span class="kpi-label">총 재고 수량</span><span class="kpi-value" id="kpiTotalStock">0</span></div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon kpi-revenue"><i class='bx bx-trending-up'></i></div>
                        <div class="kpi-data"><span class="kpi-label">총 매출 (출고 누적)</span><span class="kpi-value" id="kpiRevenue">₩0</span></div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon kpi-cost"><i class='bx bx-shopping-bag'></i></div>
                        <div class="kpi-data"><span class="kpi-label">총 매입 (비용 누적)</span><span class="kpi-value" id="kpiCost">₩0</span></div>
                    </div>
                </div>

                <!-- Inventory Table -->
                <section class="section-block">
                    <div class="panel">
                        <div class="panel-header complex-header">
                            <div class="header-top">
                                <h2><i class='bx bx-box'></i> 실시간 재고 현황 <span class="product-count-text" id="totalCount">0건</span></h2>
                                <div class="header-controls">
                                    <button id="entryBtn" class="btn-primary"><i class='bx bx-edit-alt'></i> 입출고 등록</button>
                                    <button id="deleteBtn" class="btn-outline btn-outline-danger"><i class='bx bx-trash'></i> 삭제</button>
                                </div>
                            </div>
                        </div>

                        <!-- Search -->
                        <div class="search-strip" style="padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface-container-lowest);">
                            <div class="si-search-container">
                                <div class="si-search-bar" id="search-conditions" style="margin-bottom: 0;">
                                    <div class="si-condition-row">
                                        <select class="si-field-select" data-role="field">
                                            <option value="all">통합검색</option>
                                            <option value="supplier">공급사</option>
                                            <option value="brand">브랜드</option>
                                            <option value="name">상품명</option>
                                            <option value="color">컬러</option>
                                            <option value="size">사이즈</option>
                                        </select>
                                        <input type="text" class="si-search-input" data-role="query" placeholder="검색어 입력..." id="searchInput">
                                    </div>
                                </div>
                                <div class="si-search-actions" style="margin-top: 8px;">
                                    <button type="button" class="si-btn-reset" id="btn-clear-search"><i class="bx bx-reset"></i> 초기화</button>
                                    <button type="button" class="si-btn-search" id="btn-do-search"><i class="bx bx-search"></i> 검색</button>
                                </div>
                            </div>
                        </div>

                        <!-- Table -->
                        <div class="table-responsive">
                            <table class="data-table" id="dataTable">
                                <thead>
                                    <tr>
                                        <th class="col-check"><input type="checkbox" id="selectAll"></th>
                                        <th class="sortable" data-sort="supplier">공급사 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="brand">브랜드 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="name">상품명 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="color">컬러 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="size">사이즈 <i class='bx bx-sort'></i></th>
                                        <th class="col-num sortable" data-sort="buyPrice">매입 단가 <i class='bx bx-sort'></i></th>
                                        <th class="col-num sortable" data-sort="stock">현재 재고 <i class='bx bx-sort'></i></th>
                                        <th class="col-action">관리</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <tr class="loading-row"><td colspan="9"><div class="skeleton"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="pagination" id="pagination"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Entry Modal -->
    <div id="entryModal" class="modal">
        <div class="modal-content" style="max-width: 680px;">
            <div class="modal-header">
                <h2 id="entryModalTitle">입출고 등록</h2>
                <button type="button" class="btn-close" id="closeEntryModal"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <form id="entryForm" autocomplete="off">
                    <div class="panel-header" style="border:none; padding: 0 0 12px;">
                        <div class="toggle-group">
                            <input type="radio" id="typeIn" name="txType" value="IN" checked>
                            <label for="typeIn" class="toggle-label">매입 (IN)</label>
                            <input type="radio" id="typeOut" name="txType" value="OUT">
                            <label for="typeOut" class="toggle-label">출고 (OUT)</label>
                        </div>
                    </div>

                    <div class="form-row fr-row1">
                        <div class="fg"><label for="txDate">일자</label><input type="date" id="txDate" required></div>
                        <div class="fg"><label for="fSupplier">공급사</label><input type="text" id="fSupplier" required placeholder="최가유통"></div>
                    </div>
                    <div class="form-row fr-row2">
                        <div class="fg"><label for="fBrand">브랜드</label><input type="text" id="fBrand" required placeholder="K2 세이프티"></div>
                        <div class="fg"><label for="fName">상품명</label><input type="text" id="fName" required placeholder="에어윈드베스트 선풍기조끼"></div>
                        <div class="fg"><label for="fColor">컬러</label><input type="text" id="fColor" required placeholder="블랙"></div>
                        <div class="fg"><label for="fSize">사이즈</label><input type="text" id="fSize" required placeholder="FREE"></div>
                    </div>
                    <div class="form-row fr-row3">
                        <div class="fg"><label for="txQty">수량</label><input type="number" id="txQty" min="1" required placeholder="0"></div>
                        <div class="fg" id="basePriceCol"><label for="txBasePrice">상품가</label>
                            <div class="input-vat-group"><input type="number" id="txBasePrice" min="0" placeholder="0"><label class="vat-chip"><input type="checkbox" id="txBaseVat" checked><span>VAT별도</span></label></div>
                        </div>
                        <div class="fg" id="freightCol"><label for="txFreight">운임</label>
                            <div class="input-vat-group"><input type="number" id="txFreight" min="0" placeholder="0"><label class="vat-chip"><input type="checkbox" id="txFreightVat" checked><span>VAT별도</span></label></div>
                        </div>
                        <div class="fg"><label id="lblPrice" for="txPrice">매입단가 (₩)</label>
                            <input type="number" id="txPrice" min="0" required placeholder="자동계산" readonly class="readonly-input">
                        </div>
                    </div>
                    <div class="form-row fr-row4">
                        <div class="fg"><label for="txRemarks">비고</label><input type="text" id="txRemarks" placeholder="메모 입력"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-outline" id="cancelEntry">취소</button>
                        <button type="submit" class="btn-primary"><i class='bx bx-plus-circle'></i> 등록</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="../common/js/kng-table-utils.js"></script>
    <script src="hq-inventory.js"></script>
</body>
</html>
