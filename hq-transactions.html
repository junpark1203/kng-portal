<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="K&G 본사 매입 현황 — 입출고 내역">
    <title>입출고 내역</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="./Common/css/search-engine.css">
    <style>.main-content { margin-left: 0; }</style>
    <style>
        /* ═══════════════════════════════════════
           Drawer Styles
           ═══════════════════════════════════════ */
        .drawer-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,.3);
            backdrop-filter: blur(2px); z-index: 499;
            opacity: 0; visibility: hidden; transition: all .3s ease;
        }
        .drawer-backdrop.active { opacity: 1; visibility: visible; }

        .drawer-panel {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: 500px; max-width: 100vw;
            background: var(--surface); z-index: 500;
            display: flex; flex-direction: column;
            box-shadow: -8px 0 32px rgba(0,0,0,.12);
            transform: translateX(100%);
            transition: transform .3s cubic-bezier(.4,0,.2,1);
        }
        .drawer-panel.active { transform: translateX(0); }

        /* Drawer Header */
        .drawer-header {
            padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(135deg, var(--primary) 0%, #1a2d7a 100%); color: #fff;
            flex-shrink: 0;
        }
        .drawer-header.out-mode { background: linear-gradient(135deg, #b45309 0%, #92400e 100%); }
        .drawer-header h3 { margin: 0; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .drawer-close {
            background: rgba(255,255,255,.15); border: none; color: #fff; width: 32px; height: 32px;
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: background .2s;
        }
        .drawer-close:hover { background: rgba(255,255,255,.3); }

        /* Mode Toggle in Drawer */
        .drawer-toggle-group {
            display: flex; gap: 2px; background: rgba(255,255,255,.15);
            padding: 3px; border-radius: 8px; backdrop-filter: blur(4px);
        }
        .drawer-toggle-label {
            padding: 6px 14px; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 12px; color: rgba(255,255,255,.7);
            transition: all .2s; display: flex; align-items: center; gap: 4px;
        }
        .drawer-toggle-group input[type="radio"] { display: none; }
        .drawer-toggle-group input[type="radio"]:checked + .drawer-toggle-label {
            background: #fff; color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,.15);
        }
        .drawer-header.out-mode .drawer-toggle-group input[type="radio"]:checked + .drawer-toggle-label {
            color: #92400e;
        }

        /* Drawer Step Bar */
        .drawer-step-bar {
            padding: 12px 16px; display: flex; gap: 10px;
            border-bottom: 1px solid var(--border); background: var(--gray-50);
            flex-wrap: wrap; align-items: flex-end; flex-shrink: 0;
        }
        .drawer-fg {
            display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 100px;
        }
        .drawer-fg label {
            font-size: 10px; font-weight: 700; color: var(--gray-500);
            text-transform: uppercase; letter-spacing: .5px;
        }
        .drawer-fg input {
            padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 12px; background: var(--surface); outline: none; transition: all .15s; color: var(--gray-800);
        }
        .drawer-fg input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-muted); }

        /* Drawer Body (scrollable) */
        .drawer-body {
            flex: 1; overflow-y: auto; padding: 0;
        }

        /* Invoice Table inside Drawer */
        .drawer-table-wrap { padding: 0 12px 8px; }
        .drawer-invoice-table {
            width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 12px;
        }
        .drawer-invoice-table thead th {
            position: sticky; top: 0; background: var(--gray-50); font-weight: 700;
            font-size: 10px; color: var(--gray-500); text-align: center;
            text-transform: uppercase; letter-spacing: .3px; padding: 8px 4px;
            border-bottom: 2px solid var(--border); white-space: nowrap;
        }
        .drawer-invoice-table tbody tr { transition: background .1s; }
        .drawer-invoice-table tbody tr:hover { background: var(--gray-50); }
        .drawer-invoice-table tbody td {
            padding: 3px 4px; border-bottom: 1px solid var(--border); vertical-align: middle;
        }
        .drawer-invoice-table tbody td input,
        .drawer-invoice-table tbody td select {
            width: 100%; padding: 7px 6px; border: 1px solid transparent;
            border-radius: var(--radius); font-size: 12px; outline: none;
            background: transparent; text-align: center; transition: all .15s;
            color: var(--gray-800);
        }
        .drawer-invoice-table tbody td input.text-left { text-align: left; }
        .drawer-invoice-table tbody td input:focus {
            border-color: var(--primary); background: #fff;
            box-shadow: 0 0 0 3px var(--primary-muted);
        }
        .drawer-invoice-table tbody td input:hover { border-color: var(--gray-300); }
        .drawer-invoice-table tbody td input.readonly-input {
            color: var(--gray-500); cursor: not-allowed; background: var(--gray-50);
        }

        .drawer-row-num { width: 28px; text-align: center; font-weight: 700; font-size: 11px; color: var(--gray-400); }
        .drawer-col-qty { width: 60px; }
        .drawer-col-price { width: 85px; }
        .drawer-col-action { width: 36px; }
        .drawer-col-stock { width: 50px; }

        .drawer-btn-icon {
            background: transparent; border: none; color: var(--gray-400); cursor: pointer;
            font-size: 16px; display: flex; align-items: center; justify-content: center;
            padding: 3px; border-radius: 4px; transition: all .15s;
        }
        .drawer-btn-icon:hover { color: var(--danger); background: var(--danger-muted); }

        /* VAT Toggle in Drawer */
        .drawer-vat-toggle {
            font-size: 9px; font-weight: 600; display: flex; align-items: center;
            justify-content: center; gap: 2px; color: var(--gray-400); cursor: pointer; margin-top: 1px;
        }
        .drawer-vat-toggle input {
            margin: 0; width: 10px; height: 10px; accent-color: var(--primary); cursor: pointer;
        }

        /* Add Row Button */
        .drawer-btn-add-row {
            width: calc(100% - 24px); margin: 0 12px 8px; padding: 7px;
            background: transparent; color: var(--gray-500);
            border: 2px dashed var(--gray-200); border-radius: var(--radius);
            font-weight: 600; font-size: 12px; cursor: pointer; transition: all .2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .drawer-btn-add-row:hover {
            border-color: var(--primary); color: var(--primary); background: var(--primary-muted);
        }

        /* Drawer Footer */
        .drawer-footer {
            padding: 12px 16px; border-top: 1px solid var(--border);
            background: var(--gray-50); display: flex; justify-content: space-between;
            align-items: center; flex-shrink: 0;
        }
        .drawer-summary {
            display: flex; gap: 16px; align-items: center;
        }
        .drawer-summary-chip {
            font-size: 12px; color: var(--gray-600); display: flex; align-items: center; gap: 4px;
        }
        .drawer-summary-chip strong {
            font-size: 14px; font-weight: 800; color: var(--primary);
        }
        .drawer-footer-actions { display: flex; gap: 8px; }
        .drawer-btn-reset {
            padding: 8px 14px; background: var(--surface); color: var(--gray-600);
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
            display: flex; align-items: center; gap: 4px;
        }
        .drawer-btn-reset:hover { background: var(--gray-100); color: var(--gray-800); }
        .drawer-btn-submit {
            padding: 8px 20px; background: var(--primary); color: white; border: none;
            border-radius: var(--radius); font-size: 13px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 5px;
            transition: all .2s; letter-spacing: -.2px;
        }
        .drawer-btn-submit:hover {
            background: var(--primary-hover); transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(44,62,143,.25);
        }
        .drawer-btn-submit.out-mode { background: #b45309; }
        .drawer-btn-submit.out-mode:hover {
            background: #92400e; box-shadow: 0 4px 12px rgba(180,83,9,.25);
        }

        /* Autocomplete inside Drawer */
        .drawer-autocomplete-wrapper { position: relative; }
        .drawer-autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0;
            min-width: 260px; background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 600;
            max-height: 200px; overflow-y: auto; display: none;
        }
        .drawer-autocomplete-item {
            padding: 8px 12px; cursor: pointer; font-size: 11px;
            border-bottom: 1px solid var(--gray-100); text-align: left;
            display: flex; justify-content: space-between; align-items: center;
            transition: background .1s;
        }
        .drawer-autocomplete-item:last-child { border-bottom: none; }
        .drawer-autocomplete-item:hover,
        .drawer-autocomplete-item.active { background: var(--primary-muted); }
        .drawer-ac-name { font-weight: 600; color: var(--gray-800); }
        .drawer-ac-detail { font-size: 10px; color: var(--gray-500); }
        .drawer-ac-stock {
            font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
            background: var(--success-muted); color: var(--success);
        }

        /* Stock Badge in drawer */
        .drawer-stock-badge {
            font-size: 11px; font-weight: 700; text-align: center;
            padding: 3px; border-radius: 4px;
        }
        .drawer-stock-badge.ok { color: var(--success); background: var(--success-muted); }
        .drawer-stock-badge.low { color: var(--warning); background: var(--warning-muted); }
        .drawer-stock-badge.zero { color: var(--danger); background: var(--danger-muted); }

        /* New Entry Button */
        .btn-new-entry {
            padding: 8px 16px; background: var(--primary); color: white; border: none;
            border-radius: var(--radius); font-size: 13px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            transition: all .2s; letter-spacing: -.2px;
        }
        .btn-new-entry:hover {
            background: var(--primary-hover); transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(44,62,143,.25);
        }
        .btn-new-entry i { font-size: 16px; }

        @media (max-width: 640px) {
            .drawer-panel { width: 100vw; }
            .drawer-invoice-table { display: block; overflow-x: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="mainApp">
        <main class="main-content">
            <div class="page-body">
                <section class="section-block">
                    <div class="panel">
                        <div class="panel-header complex-header">
                            <div class="header-top">
                                <h2><i class='bx bx-list-ul'></i> 입출고 내역 <span class="product-count-text" id="totalCount">0건</span></h2>
                                <div class="header-controls">
                                    <div class="toggle-group" style="margin-right: 12px;">
                                        <button class="source-tab active" data-filter="all">전체</button>
                                        <button class="source-tab" data-filter="IN">매입</button>
                                        <button class="source-tab" data-filter="OUT">출고</button>
                                    </div>
                                    <button id="newEntryBtn" class="btn-new-entry"><i class='bx bx-plus-circle'></i> 신규 내역 입력</button>
                                    <button id="deleteBtn" class="btn-outline btn-outline-danger"><i class='bx bx-trash'></i> 삭제</button>
                                </div>
                            </div>
                        </div>

                        <!-- Search -->
                        <div class="search-strip" style="padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface-container-lowest);">
                            <div class="si-search-container">
                                <div class="si-search-bar" id="search-conditions" style="margin-bottom: 0;">
                                    <div class="si-condition-row">
                                        <select class="si-field-select" data-role="field" id="searchField">
                                            <option value="all">통합검색</option>
                                            <option value="timestamp">일시</option>
                                            <option value="type">구분</option>
                                            <option value="supplier">공급사</option>
                                            <option value="productName">상품명</option>
                                            <option value="qty">수량</option>
                                            <option value="price">단가</option>
                                            <option value="remarks">비고</option>
                                        </select>
                                        <input type="text" class="si-search-input" data-role="query" placeholder="검색어 입력..." id="searchInput">
                                        <div style="display:flex; gap:6px; align-items:center; margin-left: 8px;">
                                            <label style="font-size:12px; color:var(--gray-500);">기간</label>
                                            <input type="date" id="startDate" style="padding:6px 8px; border:1px solid var(--border); border-radius:8px; font-size:12px;">
                                            <span style="color:var(--gray-400);">~</span>
                                            <input type="date" id="endDate" style="padding:6px 8px; border:1px solid var(--border); border-radius:8px; font-size:12px;">
                                        </div>
                                    </div>
                                </div>
                                <div class="si-search-actions" style="margin-top: 8px;">
                                    <button type="button" class="si-btn-reset" id="btn-clear-search"><i class="bx bx-reset"></i> 초기화</button>
                                    <button type="button" class="si-btn-search" id="btn-do-search"><i class="bx bx-search"></i> 검색</button>
                                </div>
                            </div>
                        </div>

                        <!-- Table -->
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th class="col-check"><input type="checkbox" id="selectAll"></th>
                                        <th class="sortable" data-sort="txDate">일시 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="type" style="text-align:center;">구분 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="supplier">공급사 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="productName">상품명/내역 <i class='bx bx-sort'></i></th>
                                        <th class="col-num sortable" data-sort="qty">수량 <i class='bx bx-sort'></i></th>
                                        <th class="col-num sortable" data-sort="basePrice">상품가 <i class='bx bx-sort'></i></th>
                                        <th class="col-num sortable" data-sort="freight">운임 <i class='bx bx-sort'></i></th>
                                        <th class="col-num sortable" data-sort="price">단가 <br><span style="font-size:10px;color:var(--gray-400);font-weight:400">(공급가)</span> <i class='bx bx-sort'></i></th>
                                        <th class="col-num sortable" data-sort="totalAmount">총 금액 <br><span style="font-size:10px;color:var(--gray-400);font-weight:400">(공급가)</span> <i class='bx bx-sort'></i></th>
                                        <th>비고</th>
                                        <th class="col-action">관리</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <tr class="loading-row"><td colspan="12"><div class="skeleton"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="pagination" id="pagination"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content" style="max-width: 640px;">
            <div class="modal-header">
                <h2>입출고 내역 수정</h2>
                <button type="button" class="btn-close" id="closeEditModal"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <form id="editForm" autocomplete="off">
                    <input type="hidden" id="editId">
                    <div class="form-row fr-row1">
                        <div class="fg"><label for="eTxDate">일자</label><input type="date" id="eTxDate" required></div>
                        <div class="fg"><label for="eTxType">구분</label><input type="text" id="eTxType" readonly class="readonly-input"></div>
                        <div class="fg"><label for="eSupplier">공급사</label><input type="text" id="eSupplier"></div>
                    </div>
                    <div class="form-row fr-row2">
                        <div class="fg"><label for="eBrand">브랜드</label><input type="text" id="eBrand"></div>
                        <div class="fg"><label for="eName">상품명</label><input type="text" id="eName"></div>
                        <div class="fg"><label for="eColor">컬러</label><input type="text" id="eColor"></div>
                        <div class="fg"><label for="eSize">사이즈</label><input type="text" id="eSize"></div>
                    </div>
                    <div class="form-row fr-row3" style="grid-template-columns: repeat(5, 1fr);">
                        <div class="fg"><label for="eQty">수량</label><input type="number" id="eQty" min="1" required></div>
                        <div class="fg" id="eBasePriceCol"><label for="eBasePrice">상품가</label>
                            <div class="input-vat-group"><input type="number" id="eBasePrice" min="0" placeholder="0"><label class="vat-chip"><input type="checkbox" id="eBaseVat" checked><span>VAT별도</span></label></div>
                        </div>
                        <div class="fg" id="eFreightCol"><label for="eFreight">운임</label>
                            <div class="input-vat-group"><input type="number" id="eFreight" min="0" placeholder="0"><label class="vat-chip"><input type="checkbox" id="eFreightVat" checked><span>VAT별도</span></label></div>
                        </div>
                        <div class="fg"><label id="eLblPrice" for="ePrice">단가 <span style="font-size:11px;color:var(--gray-400);font-weight:normal;">(공급가)</span></label>
                            <input type="number" id="ePrice" min="0" required placeholder="자동계산" class="readonly-input">
                        </div>
                        <div class="fg"><label for="eTotalAmount">총 금액</label>
                            <input type="text" id="eTotalAmount" class="readonly-input" readonly style="font-weight:700; color:var(--primary); font-size:16px;">
                        </div>
                    </div>
                    <div class="form-row fr-row4">
                        <div class="fg"><label for="eRemarks">비고</label><input type="text" id="eRemarks"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-outline" id="cancelEdit">취소</button>
                        <button type="submit" class="btn-primary"><i class='bx bx-save'></i> 수정하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ═══ Entry Drawer ═══ -->
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="drawer-panel" id="drawerPanel">
        <div class="drawer-header" id="drawerHeader">
            <div style="display:flex; align-items:center; gap:10px;">
                <h3><i class='bx bx-package'></i> 입출고 등록</h3>
                <div class="drawer-toggle-group">
                    <input type="radio" id="dTypeIn" name="dTxType" value="IN" checked>
                    <label for="dTypeIn" class="drawer-toggle-label"><i class='bx bx-down-arrow-circle'></i> 매입</label>
                    <input type="radio" id="dTypeOut" name="dTxType" value="OUT">
                    <label for="dTypeOut" class="drawer-toggle-label"><i class='bx bx-up-arrow-circle'></i> 출고</label>
                </div>
            </div>
            <button class="drawer-close" id="drawerCloseBtn"><i class='bx bx-x'></i></button>
        </div>

        <div class="drawer-step-bar">
            <div class="drawer-fg" style="flex:0 0 120px;"><label>일자</label><input type="date" id="dTxDate"></div>
            <div class="drawer-fg" style="flex:0 0 140px;"><label>공급사 / 출고처</label><input type="text" id="dSupplier" placeholder="공급사명 입력"></div>
            <div class="drawer-fg" style="flex:2;"><label>비고</label><input type="text" id="dRemarks" placeholder="전체 항목에 적용될 메모 (선택)"></div>
        </div>

        <div class="drawer-body">
            <div class="drawer-table-wrap">
                <table class="drawer-invoice-table" id="dItemsTable">
                    <thead id="dTableHead">
                        <!-- populated by JS -->
                    </thead>
                    <tbody id="dItemsBody">
                        <!-- Rows will be added dynamically -->
                    </tbody>
                </table>
            </div>
            <button type="button" class="drawer-btn-add-row" id="dBtnAddRow"><i class='bx bx-plus'></i> 상품 행 추가</button>
        </div>

        <div class="drawer-footer">
            <div class="drawer-summary">
                <div class="drawer-summary-chip"><i class='bx bx-box' style="font-size:16px;color:var(--gray-400)"></i> 등록 대기 <strong id="dSummaryRows">0</strong> 건</div>
                <div class="drawer-summary-chip" id="dSummaryTotalWrap" style="display:none;">총액 <strong id="dSummaryTotal">0</strong> 원</div>
            </div>
            <div class="drawer-footer-actions">
                <button type="button" class="drawer-btn-reset" id="dResetBtn"><i class='bx bx-reset'></i> 초기화</button>
                <button type="button" class="drawer-btn-submit" id="dSubmitBtn"><i class='bx bx-check'></i> 일괄 등록</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="hq-transactions.js"></script>
    <script src="hq-entry-drawer.js"></script>
</body>
</html>
