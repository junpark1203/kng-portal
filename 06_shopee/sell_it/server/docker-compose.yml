services:
  sell-it-server:
    image: ghcr.io/junpark1203/sell-it-server:latest
    container_name: sell_it_server
    restart: always
    volumes:
      - ./data:/usr/src/app/data
      - ./uploads:/usr/src/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.scope=sell-it"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sell_it_cloudflared
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=eyJhIjoiZDk3YWNjYzU2MjdmODIwYmY5OTlkNzVkMTZlNGNkY2YiLCJ0IjoiZjc2NTNiM2ItMWM1NC00YTg4LThjNzgtMTA5Njg4OWUwMDZlIiwicyI6Ik56a3lORGxpTldFdE9ETmxNeTAwTnpJeExXSTJNR010TWpWbVlUQmpNbUppWWpjeCJ9
    depends_on:
      sell-it-server:
        condition: service_healthy

  watchtower:
    image: containrrr/watchtower
    container_name: sell_it_watchtower
    restart: always
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCOPE=sell-it
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "com.centurylinklabs.watchtower.scope=sell-it"

