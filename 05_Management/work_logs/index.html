<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 업무일지 (Work Logs)</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <!-- ListView -->
        <div id="listView" class="view-section active">
            <div class="header-area">
                <div class="header-title">
                    <h1><i class="fa-solid fa-book-open"></i> 개인 업무일지</h1>
                    <p>나의 업무 이력을 깔끔하게 기록하고 관리하세요.</p>
                </div>
                <div class="header-actions">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="업무 내용 검색...">
                    </div>
                    <button class="btn-primary" id="btnNewLog"><i class="fa-solid fa-pen"></i> 업무일지 작성</button>
                </div>
            </div>

            <div class="filter-area glass-panel" style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-weight: 600; color: var(--text-muted); font-size: 13px; white-space: nowrap;">기간</label>
                    <input type="date" id="filterStartDate" class="filter-input">
                    <span style="color: var(--text-muted);">~</span>
                    <input type="date" id="filterEndDate" class="filter-input">
                    <div class="date-presets" id="datePresets" style="margin: 0 0 0 4px; display: flex; gap: 4px;">
                        <button class="btn-preset active" data-range="all">전체</button>
                        <button class="btn-preset" data-range="1y">1년</button>
                        <button class="btn-preset" data-range="1m">1달</button>
                        <button class="btn-preset" data-range="1w">1주</button>
                    </div>
                </div>
                
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-weight: 600; color: var(--text-muted); font-size: 13px; white-space: nowrap;">유형</label>
                    <select id="filterLogType" class="filter-input">
                        <option value="">전체</option>
                        <option value="일일">일일</option>
                        <option value="주간">주간</option>
                        <option value="월간">월간</option>
                    </select>
                </div>
                
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-weight: 600; color: var(--text-muted); font-size: 13px; white-space: nowrap;">구분</label>
                    <select id="filterCategory" class="filter-input">
                        <option value="">전체</option>
                        <option value="업무">업무</option>
                        <option value="보고">보고</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                
                <div class="checkbox-group" style="margin: 0; display: flex; align-items: center;">
                    <label style="white-space: nowrap;"><input type="checkbox" id="filterDraft"> 임시저장만 보기</label>
                </div>
            </div>

            <div class="list-container" id="logList">
                <!-- Data will be loaded here -->
            </div>
        </div>

        <!-- EditView / DetailView (Shared Form) -->
        <div id="editView" class="view-section">
            <div class="editor-header">
                <button class="btn-back" id="btnBack"><i class="fa-solid fa-arrow-left"></i> 뒤로가기</button>
                <div class="editor-actions">
                    <button class="btn-secondary" id="btnSaveDraft"><i class="fa-solid fa-floppy-disk"></i> 임시저장</button>
                    <button class="btn-primary" id="btnSave"><i class="fa-solid fa-check"></i> 저장완료</button>
                    <button class="btn-danger" id="btnDelete" style="display: none;"><i class="fa-solid fa-trash"></i> 삭제</button>
                </div>
            </div>

            <div class="editor-form glass-panel">
                <div class="form-row multi-col" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label>작성일</label>
                        <input type="date" id="inputDate" required>
                    </div>
                    <div class="form-group">
                        <label>작성자</label>
                        <input type="text" id="inputAuthorName" required>
                    </div>
                </div>

                <div class="form-row multi-col" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label>유형</label>
                        <select id="inputLogType">
                            <option value="일일">일일</option>
                            <option value="주간">주간</option>
                            <option value="월간">월간</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>구분</label>
                        <select id="inputCategory">
                            <option value="업무">업무</option>
                            <option value="보고">보고</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                </div>

                <div class="form-row split-editor">
                    <div class="form-group half-width">
                        <label>금일사항 (Today's Work)</label>
                        <textarea id="editorToday" placeholder="오늘 진행한 업무 내용을 자유롭게 작성하세요..."></textarea>
                    </div>
                    <div class="form-group half-width">
                        <label>차일사항 (Next Work)</label>
                        <textarea id="editorNext" placeholder="내일 또는 향후 진행할 업무 내용을 자유롭게 작성하세요..."></textarea>
                    </div>
                </div>

                <div class="attachment-section">
                    <label style="font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; display: block;">첨부 이미지</label>
                    <div class="dropzone" id="imageDropzone">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p>여기로 이미지를 드래그하거나 클릭하여 업로드하세요.</p>
                        <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
                    </div>
                    <div class="attachment-gallery" id="attachmentGallery">
                        <!-- 썸네일 미리보기가 이곳에 렌더링 됩니다 -->
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Script Entry -->
    <script type="module" src="app.js?v=1"></script>
</body>
</html>
