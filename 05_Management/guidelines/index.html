<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무처리 지침 (사내 위키)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="guidelines.css">
    
    <!-- Toast UI Editor -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <!-- 목록 뷰 -->
            <div id="listView" class="view-section active">
                <div class="section-block">
                    <div class="panel">
                        <div class="panel-header">
                            <h2><i class='bx bx-book-bookmark'></i> 업무처리 지침 / 매뉴얼</h2>
                            <div class="header-actions">
                                <button id="btnNewGuideline" class="btn-primary"><i class='bx bx-plus'></i> 새 지침 작성</button>
                            </div>
                        </div>
                        <div class="search-filter" style="padding: 0 20px 15px 20px;">
                            <div class="advanced-filter-grid" style="display: flex; gap: 10px; flex-wrap: wrap;">
                                <div class="input-with-icon" style="position: relative; flex: 1; min-width: 200px;">
                                    <i class='bx bx-search' style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #64748b;"></i>
                                    <input type="text" id="searchInput" placeholder="제목, 내용, 태그 검색..." style="width: 100%; padding: 8px 10px 8px 35px; border: 1px solid #cbd5e1; border-radius: 4px;">
                                </div>
                                <select id="categoryFilter" style="padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 4px; width: 150px;">
                                    <option value="">모든 카테고리</option>
                                    <option value="공통">공통</option>
                                    <option value="셀러K">셀러K</option>
                                    <option value="영업관리">영업관리</option>
                                    <option value="정산">정산</option>
                                    <option value="관리업무">관리업무</option>
                                    <option value="시스템">시스템</option>
                                </select>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th style="width: 120px;">카테고리</th>
                                        <th>제목</th>
                                        <th style="width: 150px;">태그</th>
                                        <th style="width: 100px;">작성자</th>
                                        <th style="width: 120px;">최종 수정일</th>
                                        <th class="col-action" style="width: 100px;">관리</th>
                                    </tr>
                                </thead>
                                <tbody id="guidelineListBody">
                                    <tr class="loading-row"><td colspan="6"><div class="skeleton"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 상세 뷰 -->
            <div id="detailView" class="view-section hidden">
                <div class="section-block">
                    <div class="panel">
                        <div class="panel-header" style="border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 15px;">
                            <div class="detail-header-left">
                                <span id="detailCategory" class="badge badge-category">카테고리</span>
                                <h2 id="detailTitle" style="margin: 10px 0; font-size: 24px;">지침 제목</h2>
                                <div class="detail-meta" style="color: #64748b; font-size: 14px;">
                                    <span id="detailAuthor"><i class='bx bx-user'></i> 관리자</span> | 
                                    <span id="detailDate"><i class='bx bx-time-five'></i> 2026-07-23</span>
                                </div>
                            </div>
                            <div class="header-actions">
                                <button id="btnEditGuideline" class="btn-primary"><i class='bx bx-edit'></i> 수정</button>
                                <button id="btnBackToList" class="btn-outline"><i class='bx bx-list-ul'></i> 목록</button>
                            </div>
                        </div>
                        <div class="detail-tags" id="detailTags" style="margin-bottom: 20px;">
                            <!-- 태그 배지들 -->
                        </div>
                        <div id="detailContent" class="toastui-editor-contents" style="min-height: 400px; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px;">
                            <!-- 본문 내용 출력 영역 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 편집(작성/수정) 뷰 -->
            <div id="editView" class="view-section hidden">
                <div class="section-block">
                    <div class="panel">
                        <div class="panel-header" style="border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 15px;">
                            <h2 id="editViewTitle"><i class='bx bx-edit'></i> 새 지침 작성</h2>
                            <div class="header-actions">
                                <button id="btnSaveGuideline" class="btn-primary"><i class='bx bx-save'></i> 저장</button>
                                <button id="btnCancelEdit" class="btn-outline"><i class='bx bx-x'></i> 취소</button>
                            </div>
                        </div>
                        <div class="edit-form">
                            <input type="hidden" id="editGuidelineId">
                            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                                <div class="fg" style="width: 200px;">
                                    <label>카테고리 <span class="required">*</span></label>
                                    <select id="editCategory" required style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                                        <option value="공통">공통</option>
                                        <option value="셀러K">셀러K</option>
                                        <option value="영업관리">영업관리</option>
                                        <option value="정산">정산</option>
                                        <option value="관리업무">관리업무</option>
                                        <option value="시스템">시스템</option>
                                    </select>
                                </div>
                                <div class="fg" style="flex: 1;">
                                    <label>제목 <span class="required">*</span></label>
                                    <input type="text" id="editTitle" required placeholder="지침 제목을 입력하세요" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                                </div>
                            </div>
                            <div class="fg" style="margin-bottom: 15px;">
                                <label>태그 (콤마로 구분하여 여러 개 입력 가능)</label>
                                <input type="text" id="editTags" placeholder="예: 오류해결, 입고, 반품" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px;">
                            </div>
                            <div class="fg">
                                <label>본문 내용 <span class="required">*</span></label>
                                <div id="editor"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </main>
    </div>
    
    <!-- Toast UI Editor JS -->
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
