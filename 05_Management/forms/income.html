<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수입결의서</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../../styles.css">
    <style>
        body { padding: 40px; text-align: center; background-color: var(--bg-body); }
        .coming-soon { background: #fff; padding: 60px 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); max-width: 600px; margin: 0 auto; }
        .coming-soon i { font-size: 64px; color: var(--primary); margin-bottom: 20px; }
        .coming-soon h1 { font-size: 24px; color: var(--gray-800); margin-bottom: 10px; }
        .coming-soon p { color: var(--gray-500); }
    </style>
</head>
<body>
    <div class="coming-soon">
        <i class='bx bx-coin-stack'></i>
        <h1>수입결의서</h1>
        <p>해당 양식 관리 기능은 현재 준비 중입니다.</p>
    </div>
</body>
</html>
