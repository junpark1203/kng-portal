<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장별 유류 자재 공급 현황</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="../../../kng-inventory/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 메인 콘텐츠 영역 -->
        <main class="main-content" style="margin-left: 0; padding: 20px 40px;">
            <div class="content-header">
                <div class="header-left">
                    <h1 class="page-title">현장별 유류 자재 공급 현황</h1>
                    <span class="total-count" id="totalCount">0건</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-secondary" id="deleteBtn"><i class='bx bx-trash'></i> 선택 삭제</button>
                    <input type="file" id="excelUpload" accept=".xlsx, .xls, .csv" style="display: none;">
                    <button class="btn btn-secondary" id="uploadBtn"><i class='bx bx-upload'></i> 엑셀 업로드</button>
                    <button class="btn btn-secondary" id="exportBtn"><i class='bx bx-download'></i> 엑셀 다운로드</button>
                    <button class="btn btn-primary" id="migrateBtn"><i class='bx bx-cloud-download'></i> 구글 시트 데이터 가져오기</button>
                    <button class="btn btn-primary" id="addBtn"><i class='bx bx-plus'></i> 신규 등록</button>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <!-- 검색 바 -->
                    <div class="search-bar" style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;">
                        <div class="search-input-group" style="flex: 1; min-width: 250px;">
                            <i class='bx bx-calendar'></i>
                            <input type="text" id="searchMonth" placeholder="조회 기간 (예: 2025 또는 2025-02)" style="border:none; outline:none; background:transparent; width:100%;">
                        </div>
                        <div class="search-input-group" style="flex: 1; min-width: 120px;">
                            <i class='bx bx-building'></i>
                            <input type="text" id="searchSite" placeholder="현장명">
                        </div>
                        <div class="search-input-group" style="flex: 1; min-width: 120px;">
                            <i class='bx bx-tag'></i>
                            <input type="text" id="searchCategory" placeholder="구분 (예: 안전용품)">
                        </div>
                        <div class="search-input-group" style="flex: 1; min-width: 120px;">
                            <i class='bx bx-store'></i>
                            <input type="text" id="searchSupplier" placeholder="공급사">
                        </div>
                        <div class="search-input-group" style="flex: 1; min-width: 120px;">
                            <i class='bx bx-package'></i>
                            <input type="text" id="searchItem" placeholder="품명">
                        </div>
                        <button class="btn btn-secondary" id="resetBtn" style="padding: 10px; height: 42px;"><i class='bx bx-refresh'></i></button>
                    </div>

                    <!-- 일괄 변경 바 (숨김) -->
                    <div id="actionBar" style="display: none; padding: 12px; background: rgba(109, 74, 255, 0.05); border: 1px solid rgba(109, 74, 255, 0.2); border-radius: 8px; margin-bottom: 15px; align-items: center; gap: 10px;">
                        <span style="font-weight: 600; color: var(--primary);"><span id="selectedCount">0</span>개 선택됨</span>
                        <span style="font-size: 13px; color: var(--gray-500);">수정 기능은 개별 편집을 이용해주세요.</span>
                    </div>

                    <!-- 통계 요약표 -->
                    <div id="summaryBox" style="display: flex; flex-direction: column; gap: 15px; background: linear-gradient(to right, #eff6ff, #f0fdf4); border: 1px solid #bfdbfe; border-radius: 8px; padding: 16px 20px; margin-bottom: 20px;">
                        <!-- JS에서 동적 생성됨 -->
                    </div>

                    <div class="table-container">
                        <table class="data-table" style="font-size: 13px;">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" id="selectAll"></th>
                                    <th class="sortable" data-sort="date">공급일자 <i class='bx bx-sort'></i></th>
                                    <th class="sortable" data-sort="site">현장명 <i class='bx bx-sort'></i></th>
                                    <th class="sortable" data-sort="supplier">공급사 <i class='bx bx-sort'></i></th>
                                    <th class="sortable" data-sort="manufacturer">제조사 <i class='bx bx-sort'></i></th>
                                    <th class="sortable" data-sort="category">구분 <i class='bx bx-sort'></i></th>
                                    <th class="sortable" data-sort="item">품명 <i class='bx bx-sort'></i></th>
                                    <th class="sortable" data-sort="spec">규격 <i class='bx bx-sort'></i></th>
                                    <th>전체수량</th>
                                    <th class="sortable text-right" data-sort="qty">수량 <i class='bx bx-sort'></i></th>
                                    <th class="sortable text-right" data-sort="price">단가 <i class='bx bx-sort'></i></th>
                                    <th class="sortable text-right" data-sort="total">총액 <i class='bx bx-sort'></i></th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr class="loading-row"><td colspan="12"><div class="skeleton"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="pagination" class="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 등록/수정 모달 -->
    <div class="modal" id="itemModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3 id="modalTitle">신규 납품 등록</h3>
                <button class="close-btn" id="closeModalBtn"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <form id="itemForm">
                    <input type="hidden" id="editId">
                    <div class="form-grid" style="grid-template-columns: repeat(3, 1fr);">
                        <!-- 기본 정보 -->
                        <div class="fg">
                            <label for="inpDate">공급일자 <span style="color:var(--danger)">*</span></label>
                            <input type="date" id="inpDate" required>
                        </div>
                        <div class="fg">
                            <label for="inpSite">현장명 <span style="color:var(--danger)">*</span></label>
                            <input type="text" id="inpSite" placeholder="예: 당진공장" required>
                        </div>
                        <div class="fg">
                            <label for="inpCategory">구분</label>
                            <input type="text" id="inpCategory" placeholder="예: 안전용품">
                        </div>

                        <!-- 품목 정보 -->
                        <div class="fg">
                            <label for="inpSupplier">공급사</label>
                            <input type="text" id="inpSupplier" placeholder="예: 양지유화">
                        </div>
                        <div class="fg">
                            <label for="inpManufacturer">제조사</label>
                            <input type="text" id="inpManufacturer" placeholder="예: 현대오일뱅크">
                        </div>
                        <div class="fg">
                            <label for="inpItem">품명 <span style="color:var(--danger)">*</span></label>
                            <input type="text" id="inpItem" placeholder="예: Xteer IGO" required>
                        </div>

                        <!-- 수량 및 단가 -->
                        <div class="fg">
                            <label for="inpSpec">규격</label>
                            <input type="text" id="inpSpec" placeholder="예: 200L" oninput="calculateTotal()">
                        </div>
                        <div class="fg">
                            <label for="inpQty">수량 <span style="color:var(--danger)">*</span></label>
                            <input type="text" id="inpQty" class="text-right" placeholder="0" oninput="formatNumberInput(this); calculateTotal();" required>
                        </div>
                        <div class="fg">
                            <label for="inpTotalQty">전체 수량 (자동계산)</label>
                            <input type="text" id="inpTotalQty" class="text-right" placeholder="-" readonly style="background-color: var(--gray-100); color:var(--primary); font-weight:bold;">
                        </div>

                        <div class="fg">
                            <label for="inpPrice">단가 <span style="color:var(--danger)">*</span></label>
                            <input type="text" id="inpPrice" class="text-right" placeholder="0" oninput="formatNumberInput(this); calculateTotal();" required>
                        </div>
                        <div class="fg" style="grid-column: span 2;">
                            <label for="inpTotal">총액 (자동계산)</label>
                            <input type="text" id="inpTotal" class="text-right" placeholder="0" readonly style="background-color: var(--gray-100); color:var(--primary); font-weight:bold; font-size:16px;">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelBtn">취소</button>
                <button type="submit" form="itemForm" class="btn btn-primary">저장하기</button>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 컨테이너 -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="oil-supply.js"></script>
</body>
</html>
