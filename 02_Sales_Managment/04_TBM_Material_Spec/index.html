<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="K&G TBM 자재 규격 관리">
    <title>TBM 자재 규격</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../supply-common.css">
    <link rel="stylesheet" href="../../Common/css/search-engine.css">
    <style>
        .main-content { margin-left: 0; }

        /* ── Preset Manager Modal ── */
        .preset-modal-body { display: flex; gap: 0; min-height: 400px; }
        .preset-sidebar {
            width: 200px; min-width: 160px;
            border-right: 1px solid var(--gray-200);
            display: flex; flex-direction: column;
            background: var(--gray-50);
        }
        .preset-sidebar-header {
            padding: 12px; font-size: 11px; font-weight: 700;
            color: var(--gray-500); text-transform: uppercase;
            letter-spacing: 0.5px; border-bottom: 1px solid var(--gray-200);
            display: flex; justify-content: space-between; align-items: center;
        }
        .preset-sidebar-header button {
            background: none; border: none; cursor: pointer;
            color: var(--primary); font-size: 18px; padding: 0; line-height: 1;
        }
        .preset-sidebar-header button:hover { color: var(--primary-dark, #3b5de7); }
        .preset-list { flex: 1; overflow-y: auto; padding: 4px 0; }
        .preset-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; cursor: pointer; font-size: 12px;
            color: var(--gray-600); transition: all 0.1s;
            border-left: 3px solid transparent;
        }
        .preset-item:hover { background: var(--gray-100); }
        .preset-item.active {
            background: rgba(79, 110, 247, 0.08);
            color: var(--primary); font-weight: 600;
            border-left-color: var(--primary);
        }
        .preset-item .preset-delete-btn {
            background: none; border: none; cursor: pointer;
            color: var(--gray-400); font-size: 14px; padding: 0;
            opacity: 0; transition: opacity 0.15s;
        }
        .preset-item:hover .preset-delete-btn { opacity: 1; }
        .preset-item .preset-delete-btn:hover { color: #dc2626; }
        .preset-editor {
            flex: 1; padding: 16px;
            display: flex; flex-direction: column;
        }
        .preset-editor-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid var(--gray-200);
        }
        .preset-editor-header h3 {
            font-size: 14px; font-weight: 600; color: var(--gray-700);
        }
        .preset-field-list { flex: 1; overflow-y: auto; }
        .preset-field-row {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 0; border-bottom: 1px solid var(--gray-100);
        }
        .preset-field-row .field-order {
            width: 20px; text-align: center;
            font-size: 10px; font-weight: 600; color: var(--gray-400);
        }
        .preset-field-row input,
        .preset-field-row textarea {
            flex: 1; height: 32px; padding: 4px 10px;
            border: 1px solid var(--border); border-radius: 5px;
            font-size: 12px; outline: none; font-family: 'Inter', sans-serif;
        }
        .preset-field-row textarea.pf-label {
            height: 48px; min-height: 48px; resize: vertical;
            line-height: 1.5;
        }
        .preset-field-row input:focus,
        .preset-field-row textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2.5px var(--primary-muted);
        }
        .preset-field-row select {
            width: 90px; height: 32px; padding: 0 6px;
            border: 1px solid var(--border); border-radius: 5px;
            font-size: 11px; outline: none; background: var(--surface);
        }
        .preset-field-row .field-remove-btn {
            width: 28px; height: 28px; border: 1px solid var(--gray-200);
            border-radius: 5px; background: var(--surface);
            color: var(--gray-400); cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 14px; padding: 0; transition: all 0.15s;
        }
        .preset-field-row .field-remove-btn:hover {
            border-color: #dc2626; color: #dc2626; background: #fef2f2;
        }
        .preset-field-row.is-section {
            background: linear-gradient(135deg, rgba(79,110,247,0.06), rgba(79,110,247,0.02));
            border-left: 3px solid var(--primary);
            border-radius: 4px; margin: 6px 0 2px; padding: 6px 8px;
        }
        .preset-field-row.is-section .field-order {
            color: var(--primary); font-weight: 700; font-size: 9px;
        }
        .preset-field-row.is-section textarea {
            font-weight: 600; color: var(--primary);
        }
        .preset-no-selection {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: var(--gray-400); font-size: 13px;
        }

        /* ── File Upload Area ── */
        .file-upload-area {
            border: 2px dashed var(--gray-300); border-radius: 8px;
            padding: 16px; text-align: center; cursor: pointer;
            transition: all 0.2s; color: var(--gray-500);
            font-size: 12px; margin-bottom: 8px;
        }
        .file-upload-area:hover, .file-upload-area.dragover {
            border-color: var(--primary); color: var(--primary);
            background: rgba(79, 110, 247, 0.04);
        }
        .file-upload-area i { font-size: 24px; display: block; margin-bottom: 4px; }
        .file-list { display: flex; flex-direction: column; gap: 4px; }
        .file-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px; background: var(--gray-50);
            border: 1px solid var(--gray-100); border-radius: 6px;
            font-size: 11px; color: var(--gray-700);
        }
        .file-item .file-icon {
            font-size: 16px; color: var(--gray-500); flex-shrink: 0;
        }
        .file-item .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-item .file-size { color: var(--gray-400); font-size: 10px; white-space: nowrap; }
        .file-item .file-actions { display: flex; gap: 2px; }
        .file-item .file-actions button {
            width: 24px; height: 24px; border: none; background: none;
            cursor: pointer; color: var(--gray-400); font-size: 14px;
            border-radius: 4px; display: inline-flex;
            align-items: center; justify-content: center; padding: 0;
        }
        .file-item .file-actions button:hover { background: var(--gray-100); color: var(--gray-700); }
        .file-item .file-actions button.file-delete-btn:hover { color: #dc2626; background: #fef2f2; }

        /* ── Custom Fields Section ── */
        .custom-fields-section {
            grid-column: 1 / -1;
            padding: 10px 0 0;
        }
        .custom-fields-title {
            font-size: 11px; font-weight: 700; color: var(--primary);
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 4px 0 8px; border-bottom: 1px dashed var(--primary-muted);
            display: flex; align-items: center; gap: 6px;
        }
        .custom-fields-title i { font-size: 14px; }
        .custom-fields-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-top: 10px;
        }
        .cf-section-divider {
            grid-column: 1 / -1;
            font-size: 11px; font-weight: 700; color: var(--primary);
            padding: 8px 0 4px; margin-top: 6px;
            border-bottom: 1px dashed var(--primary-muted);
            display: flex; align-items: center; gap: 6px;
            white-space: pre-line;
        }
        .cf-section-divider i { font-size: 13px; }

        /* ── Attachment Badge ── */
        .attach-badge {
            display: inline-flex; align-items: center; gap: 2px;
            font-size: 10px; color: var(--gray-500);
        }
        .attach-badge i { font-size: 13px; }
        .attach-badge.has-files { color: var(--primary); }

        /* ── Header Toolbar ── */
        .header-toolbar {
            display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
        }

        /* ════════════════════════════════════════
           CARD VIEW LAYOUT
           ════════════════════════════════════════ */
        .tbm-content-layout { display: flex; border-top: 1px solid var(--gray-200); min-height: 500px; }

        /* ── Sidebar ── */
        .tbm-sidebar {
            width: 220px; min-width: 200px; border-right: 1px solid var(--gray-200);
            background: var(--surface-container-lowest, #fafbfc);
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .sidebar-section-title {
            padding: 12px 16px 8px; font-size: 10px; font-weight: 700;
            color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.8px;
            border-bottom: 1px solid var(--gray-100);
        }
        .sidebar-cat-list { padding: 4px 0; }
        .sidebar-cat-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 16px; cursor: pointer; font-size: 12px; font-weight: 500;
            color: var(--gray-600); border-left: 3px solid transparent;
            transition: all 0.12s;
        }
        .sidebar-cat-item:hover { background: var(--gray-100); }
        .sidebar-cat-item.active {
            background: rgba(79,110,247,0.07); color: var(--primary);
            font-weight: 700; border-left-color: var(--primary);
        }
        .sidebar-cat-count {
            font-size: 10px; font-weight: 700; color: var(--gray-400);
            background: var(--gray-100); padding: 1px 7px; border-radius: 10px;
        }
        .sidebar-cat-item.active .sidebar-cat-count { background: rgba(79,110,247,0.15); color: var(--primary); }
        .sidebar-divider { height: 1px; background: var(--gray-200); margin: 4px 12px; }
        .sidebar-field-section { padding: 8px 12px 12px; }
        .sidebar-field-row {
            display: flex; align-items: center; gap: 6px; padding: 4px 0;
        }
        .sidebar-field-row label {
            font-size: 11px; color: var(--gray-600); cursor: pointer;
            flex: 1; white-space: pre-line; line-height: 1.3;
        }
        .sidebar-field-row input[type="checkbox"] { accent-color: var(--primary); }
        .sidebar-field-input {
            margin-top: 6px; display: flex; gap: 4px;
        }
        .sidebar-field-input input {
            flex: 1; height: 30px; padding: 0 8px; border: 1px solid var(--border);
            border-radius: 5px; font-size: 11px; outline: none;
        }
        .sidebar-field-input input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-muted); }
        .sidebar-field-input button {
            height: 30px; padding: 0 10px; border: none; border-radius: 5px;
            background: var(--primary); color: #fff; font-size: 11px; font-weight: 600;
            cursor: pointer; white-space: nowrap;
        }
        .sidebar-field-input button:hover { opacity: 0.9; }
        .sidebar-field-reset {
            margin-top: 4px; border: none; background: none; color: var(--gray-400);
            font-size: 10px; cursor: pointer; padding: 2px 0;
        }
        .sidebar-field-reset:hover { color: var(--primary); }

        /* ── Card List ── */
        .tbm-card-list-area { flex: 1; padding: 16px; overflow-y: auto; }
        .tbm-card {
            border: 1px solid var(--gray-200); border-radius: 10px;
            margin-bottom: 14px; background: var(--surface);
            overflow: hidden; transition: box-shadow 0.2s;
        }
        .tbm-card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.06); }
        .tbm-card-header {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; background: var(--gray-50);
            border-bottom: 1px solid var(--gray-100); cursor: pointer;
        }
        .tbm-card-check { flex-shrink: 0; }
        .tbm-card-rank {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--primary); color: #fff; font-size: 10px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .tbm-card-name {
            font-size: 14px; font-weight: 700; color: var(--gray-800); margin-right: 6px;
        }
        .tbm-card-spec-brief {
            font-size: 12px; color: var(--gray-500); font-weight: 500;
        }
        .tbm-card-title-area { flex: 1; min-width: 0; }
        .tbm-card-toggle {
            border: 1px solid var(--gray-200); background: var(--surface);
            border-radius: 5px; padding: 4px 10px; font-size: 10px;
            color: var(--gray-500); cursor: pointer; white-space: nowrap;
            display: flex; align-items: center; gap: 3px;
        }
        .tbm-card-toggle:hover { border-color: var(--primary); color: var(--primary); }
        .tbm-card-body {
            display: flex; gap: 16px; padding: 14px 16px 16px;
            transition: all 0.2s;
        }
        .tbm-card.collapsed .tbm-card-body { display: none; }
        .tbm-card-thumb {
            width: 130px; height: 130px; flex-shrink: 0; border-radius: 8px;
            overflow: hidden; background: var(--gray-100);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .tbm-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .tbm-card-thumb .no-image {
            color: var(--gray-400); font-size: 10px; text-align: center; line-height: 1.5;
        }
        .tbm-card-thumb .no-image i { font-size: 28px; display: block; margin-bottom: 2px; color: var(--gray-300); }
        .tbm-card-detail { flex: 1; min-width: 0; cursor: pointer; }
        .tbm-card-basic {
            font-size: 12px; color: var(--gray-600); margin-bottom: 8px;
            display: flex; flex-wrap: wrap; gap: 4px 12px; align-items: center;
        }
        .tbm-card-fields { margin-bottom: 8px; }
        .tbm-cf-section-label {
            font-size: 11px; font-weight: 700; color: var(--primary);
            margin-top: 6px; margin-bottom: 2px;
        }
        .tbm-cf-values {
            font-size: 11.5px; color: var(--gray-700); line-height: 1.6;
            display: flex; flex-wrap: wrap; gap: 2px 14px;
        }
        .tbm-cf-values b { color: var(--gray-500); font-weight: 600; }
        .tbm-card-meta {
            font-size: 11px; color: var(--gray-500); display: flex;
            flex-wrap: wrap; gap: 4px 14px; margin-bottom: 6px;
        }
        .tbm-card-total { font-weight: 700; color: var(--primary); }
        .tbm-card-footer {
            font-size: 10px; color: var(--gray-400);
            display: flex; gap: 12px; align-items: center;
            padding-top: 6px; border-top: 1px dashed var(--gray-100);
        }
        .tbm-card-footer .attach-badge { font-size: 10px; }
        .tbm-empty-cards {
            text-align: center; padding: 60px 20px; color: var(--gray-400); font-size: 13px;
        }
        .tbm-empty-cards i { font-size: 40px; display: block; margin-bottom: 8px; }

        /* ── Compare Modal ── */
        .compare-table-wrap { overflow-x: auto; }
        .compare-table {
            width: 100%; border-collapse: collapse; font-size: 12px;
        }
        .compare-table th, .compare-table td {
            padding: 8px 12px; border: 1px solid var(--gray-200);
            text-align: left; vertical-align: top;
        }
        .compare-table thead th {
            background: var(--gray-50); font-weight: 700; text-align: center;
            position: sticky; top: 0;
        }
        .compare-table .compare-label {
            background: var(--gray-50); font-weight: 600; color: var(--gray-600);
            width: 140px; min-width: 120px;
        }
        .compare-table .compare-section-row td {
            background: linear-gradient(135deg, rgba(79,110,247,0.06), rgba(79,110,247,0.02));
            font-weight: 700; color: var(--primary); font-size: 11px;
            border-left: 3px solid var(--primary);
        }
        .compare-diff { background: #fef6e0; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .preset-modal-body { flex-direction: column; }
            .preset-sidebar {
                width: 100%; min-width: unset; flex: none; height: 150px;
                border-right: none; border-bottom: 1px solid var(--gray-200);
            }
            .custom-fields-grid { grid-template-columns: 1fr; }
            .tbm-content-layout { flex-direction: column; }
            .tbm-sidebar {
                width: 100%; min-width: unset; border-right: none;
                border-bottom: 1px solid var(--gray-200);
                max-height: 200px; flex-direction: row; flex-wrap: wrap;
            }
            .sidebar-cat-list { display: flex; flex-wrap: wrap; gap: 0; }
            .sidebar-cat-item { padding: 6px 12px; font-size: 11px; border-left: none; border-bottom: 2px solid transparent; }
            .sidebar-cat-item.active { border-bottom-color: var(--primary); border-left: none; }
            .sidebar-field-section { width: 100%; }
            .tbm-card-body { flex-direction: column; }
            .tbm-card-thumb { width: 100%; height: 160px; }
        }
    </style>
</head>

<body>
    <div class="app-container" id="mainApp">
        <main class="main-content">
            <div class="page-body">
                <section class="section-block">
                    <div class="panel">
                        <!-- Panel Header -->
                        <div class="panel-header complex-header">
                            <div class="header-top">
                                <h2><i class='bx bx-cog'></i> TBM 자재 규격 <span class="product-count-text" id="totalCount">0건</span></h2>
                                <div class="header-controls">
                                    <div class="header-toolbar">
                                        <button id="presetBtn" class="btn-outline"><i class='bx bx-slider-alt'></i> 프리셋 관리</button>
                                        <button id="exportBtn" class="btn-outline btn-outline-success"><i class='bx bx-download'></i> 엑셀</button>
                                        <button id="compareBtn" class="btn-outline" style="border-color:#8b5cf6;color:#8b5cf6;"><i class='bx bx-transfer'></i> 비교</button>
                                        <button id="deleteBtn" class="btn-outline btn-outline-danger"><i class='bx bx-trash'></i> 삭제</button>
                                        <button id="addBtn" class="btn-primary"><i class='bx bx-plus-circle'></i> 신규 등록</button>
                                    </div>
                                </div>
                            </div>
                            <div class="header-bottom" style="display:none;"></div>
                        </div>

                        <!-- Search Strip -->
                        <div class="search-strip" style="padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface-container-lowest);">
                            <div class="si-search-container">
                                <div class="si-search-bar" id="search-conditions" style="margin-bottom: 0;">
                                    <div class="si-condition-row">
                                        <select class="si-field-select" data-role="field">
                                            <option value="all">통합검색</option>
                                            <option value="site">현장명</option>
                                            <option value="equipment">장비명</option>
                                            <option value="category">분류</option>
                                            <option value="itemName">품목명</option>
                                            <option value="spec">규격/모델</option>
                                            <option value="manufacturer">제조사</option>
                                        </select>
                                        <input type="text" class="si-search-input" data-role="query" placeholder="검색어 입력...">
                                    </div>
                                </div>
                                <div class="si-search-actions" style="margin-top: 8px;">
                                    <button type="button" class="si-btn-add" id="btn-add-condition"><i class="bx bx-plus"></i> 조건추가</button>
                                    <button type="button" class="si-btn-reset" id="btn-clear-search"><i class="bx bx-reset"></i> 초기화</button>
                                    <button type="button" class="si-btn-search" id="btn-do-search"><i class="bx bx-search"></i> 검색</button>
                                </div>
                            </div>
                            <div class="si-filter-chips" id="filter-chips" style="margin-top: 12px;"></div>
                        </div>

                        <!-- KPI Bar -->
                        <div class="kpi-bar" id="kpiBar">
                            <div class="kpi-card">
                                <div class="kpi-label">조회 건수</div>
                                <div class="kpi-value" id="kpiCount">0</div>
                            </div>
                            <div class="kpi-card">
                                <div class="kpi-label">총 수량</div>
                                <div class="kpi-value" id="kpiQty">0</div>
                            </div>
                            <div class="kpi-card">
                                <div class="kpi-label">총 금액</div>
                                <div class="kpi-value" id="kpiTotal">₩0</div>
                            </div>
                            <div class="kpi-card">
                                <div class="kpi-label">장비 수</div>
                                <div class="kpi-value" id="kpiEquipments">0</div>
                            </div>
                        </div>

                        <!-- Card View Layout -->
                        <div class="tbm-content-layout">
                            <aside class="tbm-sidebar" id="tbmSidebar">
                                <div class="sidebar-section">
                                    <div class="sidebar-section-title">분류 목록</div>
                                    <div class="sidebar-cat-list" id="sidebarCatList"></div>
                                </div>
                                <div id="sidebarFieldSection" style="display:none;">
                                    <div class="sidebar-divider"></div>
                                    <div class="sidebar-section-title">필드 검색</div>
                                    <div class="sidebar-field-section">
                                        <div id="sidebarFieldList"></div>
                                        <div class="sidebar-field-input">
                                            <input type="text" id="sidebarFieldInput" placeholder="검색값 입력...">
                                            <button type="button" id="sidebarFieldSearchBtn"><i class='bx bx-search'></i></button>
                                        </div>
                                        <button type="button" class="sidebar-field-reset" id="sidebarFieldResetBtn">초기화</button>
                                    </div>
                                </div>
                            </aside>
                            <div class="tbm-card-list-area">
                                <div class="tbm-sort-bar" style="display:flex;gap:8px;align-items:center;margin-bottom:10px;font-size:11px;color:var(--gray-500);">
                                    <label><input type="checkbox" id="selectAll" style="accent-color:var(--primary);"> 전체선택</label>
                                    <span style="flex:1;"></span>
                                    <span>정렬:</span>
                                    <select id="sortSelect" style="height:28px;border:1px solid var(--border);border-radius:5px;font-size:11px;padding:0 6px;">
                                        <option value="updatedAt-desc">최신순</option>
                                        <option value="updatedAt-asc">오래된순</option>
                                        <option value="itemName-asc">품목명 ↑</option>
                                        <option value="itemName-desc">품목명 ↓</option>
                                        <option value="total-desc">금액 높은순</option>
                                        <option value="total-asc">금액 낮은순</option>
                                    </select>
                                </div>
                                <div id="cardList"></div>
                                <div class="pagination" id="pagination"></div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- ═══ Add/Edit Modal ═══ -->
    <div id="itemModal" class="modal">
        <div class="modal-content" style="max-width:640px;">
            <div class="modal-header">
                <h2 id="modalTitle">신규 자재 등록</h2>
                <button type="button" class="btn-close" id="closeModalBtn"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <form id="itemForm" autocomplete="off">
                    <input type="hidden" id="editId">
                    <div class="modal-form-grid">
                        <div class="modal-section-title section-supply fg-full">장비 정보</div>
                        <div class="fg">
                            <label for="inpSite">현장명</label>
                            <input type="text" id="inpSite" list="listSite" placeholder="현장 선택 또는 입력" required>
                            <datalist id="listSite"></datalist>
                        </div>
                        <div class="fg">
                            <label for="inpEquipment">장비명</label>
                            <input type="text" id="inpEquipment" list="listEquipment" placeholder="TBM #1" required>
                            <datalist id="listEquipment"></datalist>
                        </div>
                        <div class="fg fg-full">
                            <label for="inpCategory">자재 분류</label>
                            <select id="inpCategory" required>
                                <option value="">— 분류 선택 —</option>
                            </select>
                        </div>

                        <div class="modal-section-title section-product fg-full">품목</div>
                        <div class="fg">
                            <label for="inpItemName">품목명</label>
                            <input type="text" id="inpItemName" list="listItemName" placeholder="품목명 입력" required>
                            <datalist id="listItemName"></datalist>
                        </div>
                        <div class="fg">
                            <label for="inpSpec">규격/모델</label>
                            <input type="text" id="inpSpec" placeholder="규격 또는 모델번호" required>
                        </div>
                        <div class="fg">
                            <label for="inpManufacturer">제조사</label>
                            <input type="text" id="inpManufacturer" list="listManufacturer" placeholder="제조사명">
                            <datalist id="listManufacturer"></datalist>
                        </div>
                        <div class="fg">
                            <label for="inpUnit">단위</label>
                            <select id="inpUnit">
                                <option value="EA">EA</option>
                                <option value="SET">SET</option>
                                <option value="BOX">BOX</option>
                                <option value="M">M</option>
                                <option value="KG">KG</option>
                                <option value="L">L</option>
                                <option value="TON">TON</option>
                                <option value="ROLL">ROLL</option>
                            </select>
                        </div>

                        <div class="modal-section-title section-amount fg-full">수량/금액</div>
                        <div class="fg">
                            <label for="inpQty">수량</label>
                            <input type="number" id="inpQty" placeholder="0" min="0" required>
                        </div>
                        <div class="fg">
                            <label for="inpPrice">단가</label>
                            <input type="number" id="inpPrice" placeholder="0" min="0" required>
                        </div>
                        <div class="fg fg-full">
                            <label>합계 (자동계산)</label>
                            <input type="text" id="inpTotal" class="calc-preview" readonly placeholder="수량 × 단가">
                        </div>

                        <!-- Dynamic Custom Fields (populated by preset selection) -->
                        <div class="custom-fields-section" id="customFieldsSection" style="display:none;">
                            <div class="custom-fields-title"><i class='bx bx-customize'></i> <span id="customFieldsSectionTitle">커스텀 필드</span></div>
                            <div class="custom-fields-grid" id="customFieldsGrid"></div>
                        </div>

                        <div class="fg fg-full">
                            <label for="inpRemarks">비고</label>
                            <input type="text" id="inpRemarks" placeholder="메모 입력">
                        </div>

                        <!-- File Upload -->
                        <div class="fg fg-full">
                            <label>첨부파일</label>
                            <div class="file-upload-area" id="fileUploadArea">
                                <i class='bx bx-cloud-upload'></i>
                                파일을 드래그하거나 클릭하여 업로드<br>
                                <small style="color:var(--gray-400);">PDF, Excel, 이미지, CAD 등 (최대 30MB)</small>
                            </div>
                            <input type="file" id="fileInput" multiple hidden>
                            <div class="file-list" id="fileList"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-outline" id="cancelBtn">취소</button>
                        <button type="submit" class="btn-primary"><i class='bx bx-save'></i> 저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ═══ Preset Manager Modal ═══ -->
    <div id="presetModal" class="modal">
        <div class="modal-content" style="max-width:700px;">
            <div class="modal-header">
                <h2><i class='bx bx-slider-alt'></i> 필드 프리셋 관리</h2>
                <button type="button" class="btn-close" id="closePresetBtn"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body" style="padding:0;">
                <div class="preset-modal-body">
                    <div class="preset-sidebar">
                        <div class="preset-sidebar-header">
                            <span>분류 목록</span>
                            <button id="addPresetCatBtn" title="분류 추가"><i class='bx bx-plus'></i></button>
                        </div>
                        <div class="preset-list" id="presetList"></div>
                    </div>
                    <div class="preset-editor" id="presetEditor">
                        <div class="preset-no-selection" id="presetNoSelection">
                            <span>좌측에서 분류를 선택하세요</span>
                        </div>
                        <div id="presetEditorContent" style="display:none;">
                            <div class="preset-editor-header">
                                <h3 id="presetEditorTitle">필드 설정</h3>
                                <button class="btn-primary" id="savePresetBtn" style="font-size:11px; padding:6px 14px;">
                                    <i class='bx bx-save'></i> 저장
                                </button>
                            </div>
                            <div class="preset-field-list" id="presetFieldList"></div>
                            <div style="display:flex; gap:6px; margin-top:8px;">
                                <button type="button" class="add-line-btn" id="addPresetFieldBtn" style="flex:1;">
                                    <i class='bx bx-plus'></i> 필드 추가
                                </button>
                                <button type="button" class="add-line-btn" id="addPresetSectionBtn" style="flex:1; border-color:var(--primary); color:var(--primary);">
                                    <i class='bx bx-layout'></i> 섹션 추가
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ Compare Modal ═══ -->
    <div id="compareModal" class="modal">
        <div class="modal-content" style="max-width:900px;">
            <div class="modal-header" style="background:linear-gradient(135deg,#8b5cf6,#6d28d9);">
                <h2 style="color:#fff;"><i class='bx bx-transfer'></i> 자재 비교</h2>
                <button type="button" class="btn-close" id="closeCompareBtn" style="color:#fff;"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body" style="padding:0;">
                <div class="compare-table-wrap" id="compareTableWrap" style="max-height:65vh;overflow:auto;padding:16px;"></div>
            </div>
            <div class="modal-footer" style="padding:12px 16px;">
                <button type="button" class="btn-outline" id="closeCompareBtn2">닫기</button>
                <button type="button" class="btn-outline btn-outline-success" id="compareExportBtn"><i class='bx bx-download'></i> 엑셀 내보내기</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="../../common/js/kng-table-utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="../../Common/js/search-engine.js"></script>
    <script src="tbm-material.js"></script>
</body>
</html>
