<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일반 자재 공급 내역</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="../../../kng-inventory/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 메인 콘텐츠 영역 -->
        <main class="main-content" style="flex: 1; margin-left: 0; padding: 20px 40px; height: 100vh; overflow-y: auto; box-sizing: border-box;">
            <div class="content-header">
                <div class="header-left">
                    <h1 class="page-title">일반 자재 공급 내역</h1>
                    <span class="total-count" id="totalCount">0건</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-secondary" id="deleteBtn"><i class='bx bx-trash'></i> 선택 삭제</button>
                    <button class="btn btn-secondary" id="exportBtn"><i class='bx bx-download'></i> 엑셀 다운로드</button>
                    <button class="btn btn-primary" id="migrateBtn"><i class='bx bx-cloud-download'></i> 기존 데이터 가져오기</button>
                    <button class="btn btn-primary" id="addBtn"><i class='bx bx-plus'></i> 신규 등록</button>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <!-- 검색 바 -->
                    <div class="search-bar" style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;">
                        <div class="search-input-group" style="flex: 1; min-width: 250px;">
                            <i class='bx bx-calendar'></i>
                            <input type="date" id="searchStartDate" style="border:none; outline:none; background:transparent;">
                            <span style="color:var(--gray-500)">~</span>
                            <input type="date" id="searchEndDate" style="border:none; outline:none; background:transparent;">
                        </div>
                        <div class="search-input-group" style="flex: 1; min-width: 150px;">
                            <i class='bx bx-building'></i>
                            <input type="text" id="searchSite" placeholder="현장명 검색">
                        </div>
                        <div class="search-input-group" style="flex: 1; min-width: 150px;">
                            <i class='bx bx-package'></i>
                            <input type="text" id="searchItem" placeholder="품목명 검색">
                        </div>
                        <select id="searchCategory" class="search-select">
                            <option value="">구분 전체</option>
                            <option value="미분류">미분류</option>
                            <option value="안전자재">안전자재</option>
                            <option value="잡자재">잡자재</option>
                        </select>
                    </div>

                    <!-- 일괄 변경 바 (숨김) -->
                    <div id="actionBar" style="display: none; padding: 12px; background: rgba(109, 74, 255, 0.05); border: 1px solid rgba(109, 74, 255, 0.2); border-radius: 8px; margin-bottom: 15px; align-items: center; gap: 10px;">
                        <span style="font-weight: 600; color: var(--primary);"><span id="selectedCount">0</span>개 선택됨</span>
                        <button class="btn btn-secondary" onclick="batchUpdateCategory('안전자재')" style="font-size:12px; padding: 6px 12px;">안전자재로 변경</button>
                        <button class="btn btn-secondary" onclick="batchUpdateCategory('잡자재')" style="font-size:12px; padding: 6px 12px;">잡자재로 변경</button>
                        <button class="btn btn-secondary" onclick="batchUpdateCategory('미분류')" style="font-size:12px; padding: 6px 12px;">미분류로 되돌리기</button>
                    </div>

                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" id="selectAll"></th>
                                    <th class="sortable" data-sort="supplyDate">일자 <i class='bx bx-sort'></i></th>
                                    <th class="sortable" data-sort="site">현장명 <i class='bx bx-sort'></i></th>
                                    <th class="sortable" data-sort="item">품목명 <i class='bx bx-sort'></i></th>
                                    <th class="sortable text-right" data-sort="qty">수량 <i class='bx bx-sort'></i></th>
                                    <th class="sortable text-right" data-sort="price">단가 <i class='bx bx-sort'></i></th>
                                    <th class="sortable text-right" data-sort="total">합계금액 <i class='bx bx-sort'></i></th>
                                    <th class="sortable text-center" data-sort="category">구분 <i class='bx bx-sort'></i></th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr class="loading-row"><td colspan="8"><div class="skeleton"></div></td></tr>
                            </tbody>
                            <tfoot id="tableFoot" style="display: none; background: #f8fafc; font-weight: 600;">
                                <tr>
                                    <td colspan="4" class="text-center" style="color:var(--gray-600)">조회된 합계</td>
                                    <td id="sumQty" class="text-right" style="color:var(--primary)">0</td>
                                    <td class="text-right">-</td>
                                    <td id="sumTotal" class="text-right" style="color:var(--primary)">0</td>
                                    <td></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 등록/수정 모달 -->
    <div class="modal" id="itemModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="modalTitle">신규 납품 등록</h3>
                <button class="close-btn" id="closeModalBtn"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <form id="itemForm">
                    <input type="hidden" id="editId">
                    <div class="form-grid" style="grid-template-columns: repeat(2, 1fr);">
                        <div class="fg">
                            <label for="inpDate">일자 <span style="color:var(--danger)">*</span></label>
                            <input type="date" id="inpDate" required>
                        </div>
                        <div class="fg">
                            <label for="inpCategory">구분 <span style="color:var(--danger)">*</span></label>
                            <select id="inpCategory" required>
                                <option value="미분류">미분류</option>
                                <option value="안전자재">안전자재</option>
                                <option value="잡자재">잡자재</option>
                            </select>
                        </div>
                        <div class="fg">
                            <label for="inpSite">현장명 <span style="color:var(--danger)">*</span></label>
                            <input type="text" id="inpSite" placeholder="현장명 입력" required>
                        </div>
                        <div class="fg">
                            <label for="inpItem">품목명 <span style="color:var(--danger)">*</span></label>
                            <input type="text" id="inpItem" placeholder="품목명 입력" required>
                        </div>
                        <div class="fg">
                            <label for="inpQty">수량 <span style="color:var(--danger)">*</span></label>
                            <input type="text" id="inpQty" class="text-right" placeholder="0" oninput="formatNumberInput(this); calculateTotal();" required>
                        </div>
                        <div class="fg">
                            <label for="inpPrice">단가 <span style="color:var(--danger)">*</span></label>
                            <input type="text" id="inpPrice" class="text-right" placeholder="0" oninput="formatNumberInput(this); calculateTotal();" required>
                        </div>
                        <div class="fg" style="grid-column: span 2;">
                            <label for="inpTotal">합계 금액</label>
                            <input type="text" id="inpTotal" class="text-right" placeholder="자동 계산" readonly style="background-color: var(--gray-100); cursor: not-allowed; font-weight:600; color:var(--primary);">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelBtn">취소</button>
                <button type="submit" form="itemForm" class="btn btn-primary">저장하기</button>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 컨테이너 -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="supply-history.js"></script>
</body>
</html>
