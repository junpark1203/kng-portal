<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장별 현황</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../../styles.css?v=2">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout-container">
        <!-- 좌측 현장 목록 -->
        <aside class="site-sidebar">
            <div class="sidebar-header">
                <h2>🏢 현장 목록</h2>
                <button class="btn-primary" onclick="openSiteModal()"><i class='bx bx-plus'></i> 현장 추가</button>
            </div>
            <div style="padding: 10px 20px; display: flex; gap: 8px; align-items: center;">
                <input type="text" id="searchSite" placeholder="현장명 검색..." style="flex: 1; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px;">
                <button id="sortSiteBtn" class="btn-outline" style="padding: 8px; border-color: #cbd5e1; color: #475569; display: flex; align-items: center; justify-content: center;" title="정렬"><i class='bx bx-sort-a-z' style="font-size: 18px;"></i></button>
            </div>
            <div class="site-list" id="siteList">
                <div class="loading-spinner"><i class='bx bx-loader-alt bx-spin'></i> 불러오는 중...</div>
            </div>
        </aside>

        <!-- 우측 소모품 목록 -->
        <main class="consumables-main">
            <div class="empty-state" id="emptyState">
                <i class='bx bx-buildings'></i>
                <p>좌측에서 현장을 선택해주세요.</p>
            </div>

            <div class="consumables-content hidden" id="consumablesContent">
                <div class="content-header">
                    <div class="header-titles">
                        <h2 id="currentSiteName" style="margin-bottom: 5px;">현장명</h2>
                        <div id="currentSiteSpecs" class="site-specs" style="display: flex; gap: 15px; font-size: 13px; color: #475569;">
                            <span id="specTbm"><i class='bx bx-cog'></i> TBM장비: <b>-</b></span>
                            <span id="specDiameter"><i class='bx bx-target-lock'></i> 터널내경: <b>-</b></span>
                            <span id="specLength"><i class='bx bx-ruler'></i> 터널연장: <b>-</b></span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <input type="text" id="searchConsumable" placeholder="구분, 품명 검색..." style="padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px; margin-right: 8px;">
                        <button class="btn-outline" onclick="editSite()"><i class='bx bx-edit'></i> 현장 정보 수정</button>
                        <button class="btn-outline btn-outline-danger" onclick="deleteSite()"><i class='bx bx-trash'></i> 현장 삭제</button>
                        <button class="btn-primary" onclick="openConsumableModal()"><i class='bx bx-plus'></i> 소모품 추가</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>구분(상위)</th>
                                <th>구분(하위)</th>
                                <th>품명</th>
                                <th>규격</th>
                                <th>운용수량</th>
                                <th>단위</th>
                                <th>비고</th>
                                <th style="width: auto; min-width: 250px;">도면 관리</th>
                                <th class="col-action" style="width: 120px; white-space: nowrap;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="consumablesTableBody">
                            <!-- 로드됨 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- 현장 모달 -->
    <div id="siteModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2 id="siteModalTitle">현장 등록</h2>
                <button type="button" class="btn-close" onclick="closeSiteModal()"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <form id="siteForm">
                    <input type="hidden" id="siteId">
                    <div class="fg">
                        <label>현장명 <span class="required">*</span></label>
                        <input type="text" id="siteName" required placeholder="예: 평택 삼성물산 P4">
                    </div>
                    <div class="fg">
                        <label>TBM장비</label>
                        <input type="text" id="siteTbmMachine" placeholder="예: 가와사키, 소일맥 등">
                    </div>
                    <div class="form-row" style="display: flex; gap: 15px;">
                        <div class="fg" style="flex:1">
                            <label>터널내경(mm)</label>
                            <input type="text" id="siteTunnelDiameter" placeholder="예: 3000">
                        </div>
                        <div class="fg" style="flex:1">
                            <label>터널연장(m)</label>
                            <input type="text" id="siteTunnelLength" placeholder="예: 1500">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-outline" onclick="closeSiteModal()">취소</button>
                        <button type="submit" class="btn-primary">저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 소모품 모달 -->
    <div id="consumableModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2 id="consumableModalTitle">소모품 등록</h2>
                <button type="button" class="btn-close" onclick="closeConsumableModal()"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <form id="consumableForm">
                    <input type="hidden" id="consumableId">
                    <div class="form-row" style="display: flex; gap: 15px;">
                        <div class="fg" style="flex:1">
                            <label>구분(상위)</label>
                            <input type="text" id="cCategory" placeholder="예: Disc Cutter, Grease">
                        </div>
                        <div class="fg" style="flex:1">
                            <label>구분(하위)</label>
                            <input type="text" id="cSubCategory" placeholder="예: Center, Face 등 (선택)">
                        </div>
                    </div>
                    <div class="fg">
                        <label>품명 <span class="required">*</span></label>
                        <input type="text" id="cName" required placeholder="예: 안전모">
                    </div>
                    <div class="form-row" style="display: flex; gap: 15px;">
                        <div class="fg" style="flex:2">
                            <label>규격</label>
                            <input type="text" id="cSpec" placeholder="예: 백색, A-Type">
                        </div>
                        <div class="fg" style="flex:1">
                            <label>운용수량</label>
                            <input type="number" id="cOpQuantity" min="0" step="any" placeholder="예: 4">
                        </div>
                        <div class="fg" style="flex:1">
                            <label>단위</label>
                            <input type="text" id="cUnit" placeholder="예: EA">
                        </div>
                    </div>
                    <div class="fg">
                        <label>비고</label>
                        <input type="text" id="cRemarks" placeholder="추가 메모">
                    </div>
                    <div class="fg" id="cFileWrapper">
                        <label>도면 및 파일 첨부</label>
                        <div class="file-upload-zone" id="cDropZone" style="padding: 20px; text-align: center; border: 2px dashed #cbd5e1; border-radius: 8px; background: #f8fafc; cursor: pointer;">
                            <i class='bx bx-cloud-upload' style="font-size: 32px; color: #94a3b8;"></i>
                            <p style="margin: 8px 0; color: #475569; font-size: 14px;">클릭하거나 파일을 이곳에 드래그하여 업로드하세요</p>
                            <p style="margin: 0; color: #94a3b8; font-size: 12px;">여러 개의 파일을 선택할 수 있습니다.</p>
                            <input type="file" id="cFiles" multiple style="display:none;">
                        </div>
                        <div id="cSelectedFiles" style="margin-top: 8px; font-size: 13px; color: #3b82f6;"></div>
                    </div>
                    <div class="form-actions" style="margin-top: 20px;">
                        <button type="button" class="btn-outline" onclick="closeConsumableModal()">취소</button>
                        <button type="submit" class="btn-primary">저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 파일 업로드/조회 모달 -->
    <div id="fileModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>도면 및 파일 관리</h2>
                <button type="button" class="btn-close" onclick="closeFileModal()"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <div class="file-upload-zone" id="dropZone">
                    <i class='bx bx-cloud-upload'></i>
                    <p>클릭하거나 파일을 이곳에 드래그하여 업로드하세요</p>
                    <p class="text-sm text-gray">지원: 이미지(JPG, PNG), PDF, CAD 등 전 포맷 지원</p>
                    <input type="file" id="fileInput" multiple style="display:none;">
                </div>
                
                <h3 class="file-list-title" style="margin-top: 20px; font-size: 14px; font-weight: 600;">업로드된 파일</h3>
                <div class="file-list" id="fileList">
                    <!-- 파일 목록 렌더링 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 이미지/PDF 미리보기 모달 -->
    <div id="previewModal" class="modal" style="z-index: 2000;">
        <div class="modal-content" style="max-width: 90%; max-height: 90vh; width: 1000px; padding: 0;">
            <div class="modal-header" style="border-bottom: 1px solid var(--border); padding: 15px 20px;">
                <h2 id="previewTitle" style="font-size: 16px; margin: 0;">미리보기</h2>
                <button type="button" class="btn-close" onclick="closePreviewModal()"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body" style="padding: 0; height: calc(90vh - 60px); display: flex; align-items: center; justify-content: center; background: #f0f2f5;">
                <div id="previewContent" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
                    <!-- 미리보기 내용 -->
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script type="module" src="app.js?v=6"></script>
</body>
</html>
