<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정렬 기능 포함 단가 관리 시스템</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.4rem;
            color: #0f172a;
        }

        .search-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        /* 헤더 스타일 및 정렬 화살표 */
        th {
            background-color: #f1f5f9;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        th:hover {
            background-color: #e2e8f0;
        }

        th.sort-asc::after {
            content: " ▲";
            color: var(--primary);
        }

        th.sort-desc::after {
            content: " ▼";
            color: var(--primary);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .mfr-tag {
            color: #059669;
            font-weight: 600;
        }

        .btn-history {
            padding: 6px 12px;
            background: #eff6ff;
            color: var(--primary);
            border: 1px solid #dbeafe;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        #modalOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.1);
        }

        .btn-close {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* 폼 추가 관련 스타일 */
        .add-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .add-section h3 {
            margin: 0 0 15px 0;
            font-size: 1.1rem;
            color: #334155;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }

        .form-group select,
        .form-group input,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group textarea {
            height: 40px;
            resize: none;
            overflow-y: auto;
        }

        .add-btn {
            margin-top: 15px;
            padding: 12px 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: #1d4ed8;
        }

        .code-result {
            margin-top: 15px;
            padding: 15px;
            background: #1e293b;
            color: #10b981;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            line-height: 1.5;
            word-break: break-all;
        }

        .code-result span.code-block {
            display: block;
            margin-top: 10px;
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
            color: #e2e8f0;
            user-select: all;
            font-family: monospace;
            border: 1px solid #334155;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>📊 유류소모품 단가 관리</h2>

        <!-- 단가 추가 폼 -->
        <div class="add-section">
            <h3>+ 단가 추가 <span style="font-size:12px; font-weight:normal; color:#64748b">(입력 후 콤보박스에서 찾거나 직접 기입할 수
                    있습니다)</span></h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>거래처</label>
                    <input type="text" id="inpCo" list="listCo" placeholder="선택 또는 직접 입력">
                    <datalist id="listCo"></datalist>
                </div>
                <div class="form-group">
                    <label>제조사</label>
                    <input type="text" id="inpMfr" list="listMfr" placeholder="선택 또는 직접 입력">
                    <datalist id="listMfr"></datalist>
                </div>
                <div class="form-group">
                    <label>품목</label>
                    <input type="text" id="inpItem" list="listItem" placeholder="선택 또는 직접 입력">
                    <datalist id="listItem"></datalist>
                </div>
                <div class="form-group">
                    <label>규격</label>
                    <input type="text" id="inpSpec" list="listSpec" placeholder="선택 또는 직접 입력">
                    <datalist id="listSpec"></datalist>
                </div>
                <div class="form-group">
                    <label>단가</label>
                    <input type="text" id="inpPrice" placeholder="예: 55,000" oninput="formatPrice(this)">
                </div>
                <div class="form-group">
                    <label>이력 (줄바꿈 가능)</label>
                    <textarea id="inpHistory" placeholder="예: 2026-04-13: 55,000&#10;이전단가: 50,000"></textarea>
                </div>
                <div class="form-group">
                    <label>비고</label>
                    <input type="text" id="inpNote" placeholder="입력">
                </div>
            </div>
            <button class="add-btn" onclick="addNewItem()">⬇ 현재 화면 리스트에 적용 및 HTML 코드 형태 변환</button>
            <div id="codeResult" class="code-result"></div>
        </div>

        <div class="search-box">
            <input type="text" id="searchCo" onkeyup="filter()" placeholder="거래처 검색...">
            <input type="text" id="searchMfr" onkeyup="filter()" placeholder="제조사 검색...">
            <input type="text" id="searchItem" onkeyup="filter()" placeholder="품목/규격 검색...">
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortTable(0, 'string')">거래처</th>
                        <th onclick="sortTable(1, 'string')">제조사</th>
                        <th onclick="sortTable(2, 'string')">품목</th>
                        <th onclick="sortTable(3, 'string')">규격</th>
                        <th onclick="sortTable(4, 'number')">단가</th>
                        <th>이력</th>
                        <th onclick="sortTable(6, 'string')">비고</th>
                    </tr>
                </thead>
                <tbody id="mainTable"></tbody>
            </table>
        </div>
    </div>

    <div id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header" id="modalTitle" style="font-weight:bold; margin-bottom:15px;"></div>
            <div class="modal-body" id="modalBody" style="white-space:pre-wrap; font-size:14px;"></div>
            <button class="btn-close" onclick="closeModal()">닫기</button>
        </div>
    </div>

        let currentSort = { column: -1, asc: true };
        let currentDisplayedData = []; // 💡 현재 화면에 표시된 데이터 목록을 따로 저장하는 변수

        function displayData(list) {
            currentDisplayedData = list; // 화면이 바뀔 때마다 현재 리스트 업데이트
            const tbody = document.getElementById('mainTable');
            tbody.innerHTML = list.map((d, index) => `
            <tr>
                <td><strong>${d.co}</strong></td>
                <td class="mfr-tag">${d.mfr}</td>
                <td>${d.item}</td>
                <td>${d.spec}</td>
                <td>${d.price}</td>
                <td><button class="btn-history" onclick="showHistory(${index})">보기</button></td>
                <td>${d.note}</td>
            </tr>
        `).join('');
        }

        // 정렬 함수
        function sortTable(columnIndex, type) {
            const keys = ['co', 'mfr', 'item', 'spec', 'price', '', 'note'];
            const key = keys[columnIndex];

            // 정렬 상태 업데이트
            if (currentSort.column === columnIndex) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.column = columnIndex;
                currentSort.asc = true;
            }

            // 헤더 스타일 업데이트
            const ths = document.querySelectorAll('th');
            ths.forEach((th, idx) => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (idx === columnIndex) {
                    th.classList.add(currentSort.asc ? 'sort-asc' : 'sort-desc');
                }
            });

            // 실제 정렬 로직
            priceData.sort((a, b) => {
                let valA = a[key];
                let valB = b[key];

                if (type === 'number') {
                    valA = parseInt(valA.replace(/,/g, '')) || 0;
                    valB = parseInt(valB.replace(/,/g, '')) || 0;
                }

                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });

            filter(); // 정렬 후 현재 검색 조건에 맞춰 다시 필터링하여 표시
        }

        // 💡 순번을 받아 실제 데이터에서 이력을 꺼내오도록 수정
        function showHistory(index) {
            const item = currentDisplayedData[index];
            document.getElementById('modalTitle').innerText = `${item.mfr} - ${item.item} 이력`;
            document.getElementById('modalBody').innerText = item.history;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function filter() {
            const coVal = document.getElementById('searchCo').value.toLowerCase();
            const mfrVal = document.getElementById('searchMfr').value.toLowerCase();
            const itemVal = document.getElementById('searchItem').value.toLowerCase();

            const filtered = priceData.filter(d =>
                d.co.toLowerCase().includes(coVal) &&
                d.mfr.toLowerCase().includes(mfrVal) &&
                (d.item.toLowerCase().includes(itemVal) || d.spec.toLowerCase().includes(itemVal))
            );
            displayData(filtered);
        }

        // 단가 자동 콤마 기능
        function formatPrice(input) {
            let val = input.value.replace(/,/g, '');
            input.value = val.replace(/\d+/g, function (match) {
                return Number(match).toLocaleString();
            });
        }

        // 폼 제어 및 추가 로직
        function populateSelects() {
            const coSet = new Set(), mfrSet = new Set(), itemSet = new Set(), specSet = new Set();
            priceData.forEach(d => {
                if (d.co && d.co !== "-") coSet.add(d.co);
                if (d.mfr && d.mfr !== "-") mfrSet.add(d.mfr);
                if (d.item && d.item !== "-") itemSet.add(d.item);
                if (d.spec && d.spec !== "-") specSet.add(d.spec);
            });

            fillDatalist('listCo', coSet);
            fillDatalist('listMfr', mfrSet);
            fillDatalist('listItem', itemSet);
            fillDatalist('listSpec', specSet);
        }

        function fillDatalist(id, set) {
            const dl = document.getElementById(id);
            let html = '';
            [...set].sort().forEach(val => {
                html += `<option value="${val}">`;
            });
            dl.innerHTML = html;
        }

        function addNewItem() {
            const co = document.getElementById('inpCo').value.trim() || "-";
            const mfr = document.getElementById('inpMfr').value.trim() || "-";
            const item = document.getElementById('inpItem').value.trim() || "-";
            const spec = document.getElementById('inpSpec').value.trim() || "-";
            const price = document.getElementById('inpPrice').value.trim() || "-";
            const history = document.getElementById('inpHistory').value.trim() || "-";
            const note = document.getElementById('inpNote').value.trim() || "-";

            if (co === "-" || item === "-") {
                alert("입력 오류: 거래처와 품목은 필수 입력사항입니다!");
                return;
            }

            const newItem = { co, mfr, item, spec, price, history, note };

            // 더미 데이터 위에 새 데이터를 삽입
            const emptyIdx = priceData.findIndex(d => d.co === "-");
            if (emptyIdx !== -1) {
                priceData.splice(emptyIdx, 0, newItem);
            } else {
                priceData.push(newItem);
            }

            // 목록 및 드롭다운 갱신
            populateSelects();
            filter();

            // 코드 반환
            const safeHistory = history.replace(/\n/g, '\\n').replace(/"/g, '\\"');
            const codeStr = `{ co: "${co}", mfr: "${mfr}", item: "${item}", spec: "${spec}", price: "${price}", history: "${safeHistory}", note: "${note}" },`;

            const resDiv = document.getElementById('codeResult');
            resDiv.style.display = 'block';
            resDiv.innerHTML = `<strong>✅ 단가가 리스트에 반영되었습니다.</strong><br>
        영구적으로 보존하려면 아래 완성된 코드를 복사해서 HTML 파일 본문의 <code>priceData</code> 배열에 붙여넣기 해두시면 됩니다.<br>
        <span class="code-block">${codeStr}</span>`;

            // 입력 칸 리셋 (동일 품목이나 거래처 반복 입력을 위해, 가격과 이력/비고만 우선 비움 처리)
            document.getElementById('inpPrice').value = '';
            document.getElementById('inpHistory').value = '';
            document.getElementById('inpNote').value = '';
            // 다음 입력 편의를 위해 포커스 이동
            document.getElementById('inpCo').focus();
        }

        // 실행
        populateSelects();
        displayData(priceData);
    </script>

</body>

</html>
