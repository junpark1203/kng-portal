<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="K&G 매입/매출 단가 관리 시스템">
    <title>매입/매출 단가 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../kng-inventory/styles.css">
    <link rel="stylesheet" href="unit-prices.css">
    <style>.main-content { margin-left: 0; }</style>
</head>

<body>
    <div class="app-container" id="mainApp">
        <main class="main-content">
            <div class="page-body">
                <section class="section-block" id="unitPriceSection">
                    <div class="panel">
                        <!-- Panel Header -->
                        <div class="panel-header">
                            <h2><i class='bx bx-data'></i> 매입/매출 단가 관리 <span class="product-count-text" id="totalCount">0건</span></h2>
                            <div class="header-actions">
                                <!-- Category Quick Filter -->
                                <div class="category-filter-wrap">
                                    <button class="cat-chip active" data-cat="all">전체</button>
                                </div>
                                <div class="table-search-wrap">
                                    <select id="searchField" class="search-field-select">
                                        <option value="all">통합검색</option>
                                        <option value="itemName">품목명</option>
                                        <option value="manufacturer">제조사</option>
                                        <option value="supplier">공급사</option>
                                        <option value="category">카테고리</option>
                                        <option value="spec">규격</option>
                                    </select>
                                    <div class="table-search-input">
                                        <i class='bx bx-search'></i>
                                        <input type="text" id="searchInput" placeholder="검색어 입력...">
                                    </div>
                                </div>
                                <button id="deleteBtn" class="btn-outline btn-outline-danger"><i class='bx bx-trash'></i> 삭제</button>
                                <button id="addBtn" class="btn-primary"><i class='bx bx-plus-circle'></i> 단가 추가</button>
                                <button id="migrateBtn" class="btn-outline" title="V1→V2 데이터 마이그레이션"><i class='bx bx-cloud-upload'></i> 마이그레이션</button>
                            </div>
                        </div>

                        <!-- Data Table -->
                        <div class="table-responsive">
                            <table class="data-table up-table" id="dataTable">
                                <colgroup>
                                    <col class="col-check">
                                    <!-- 식별 -->
                                    <col class="col-item">
                                    <col class="col-spec">
                                    <col class="col-cat">
                                    <col class="col-mfr">
                                    <col class="col-sup">
                                    <!-- 원가 -->
                                    <col class="col-num">
                                    <col class="col-num-sm">
                                    <col class="col-num">
                                    <!-- 매출 -->
                                    <col class="col-num">
                                    <!-- 마진 -->
                                    <col class="col-num">
                                    <col class="col-num-sm">
                                    <col class="col-num-sm">
                                    <!-- 관리 -->
                                    <col class="col-hist">
                                    <col class="col-date">
                                </colgroup>
                                <thead>
                                    <!-- Group header row -->
                                    <tr>
                                        <th rowspan="2" class="col-check"><input type="checkbox" id="selectAll"></th>
                                        <th colspan="5" class="th-group-label th-group-ident">📦 품목 식별</th>
                                        <th colspan="3" class="th-group-label th-group-cost">💰 원가 구조</th>
                                        <th colspan="1" class="th-group-label th-group-sell">🛒 매출</th>
                                        <th colspan="3" class="th-group-label th-group-margin">📊 마진 분석</th>
                                        <th colspan="2" class="th-group-label th-group-mgmt">📋 관리</th>
                                    </tr>
                                    <!-- Sub-header row -->
                                    <tr>
                                        <th class="sortable" data-sort="itemName">품목명 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="spec">규격 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="category">분류 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="manufacturer">제조사 <i class='bx bx-sort'></i></th>
                                        <th class="sortable" data-sort="supplier">공급사 <i class='bx bx-sort'></i></th>
                                        <th class="col-num sortable th-group-cost" data-sort="buyPrice">매입가 <i class='bx bx-sort'></i></th>
                                        <th class="col-num-sm th-group-cost">부대비</th>
                                        <th class="col-num sortable th-group-cost" data-sort="landedCost">최종원가 <i class='bx bx-sort'></i></th>
                                        <th class="col-num sortable th-group-sell" data-sort="sellPrice">매출가 <i class='bx bx-sort'></i></th>
                                        <th class="col-num th-group-margin">마진</th>
                                        <th class="col-num-sm th-group-margin">마진율</th>
                                        <th class="col-num-sm th-group-margin">변동률</th>
                                        <th>이력</th>
                                        <th class="col-date sortable" data-sort="updatedAt">수정일 <i class='bx bx-sort'></i></th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <tr class="loading-row"><td colspan="15"><div class="skeleton"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="pagination" id="pagination"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content" style="max-width:640px;">
            <div class="modal-header">
                <h2 id="modalTitle">단가 등록</h2>
                <button type="button" class="btn-close" id="closeModalBtn"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <form id="itemForm" autocomplete="off">
                    <input type="hidden" id="editId">
                    <div class="modal-form-grid">
                        <!-- 📦 품목 식별 -->
                        <div class="modal-section-title section-info fg-full">📦 품목 식별</div>
                        <div class="fg">
                            <label for="inpItem">품목명</label>
                            <input type="text" id="inpItem" list="listItem" placeholder="선택 또는 직접 입력" required>
                            <datalist id="listItem"></datalist>
                            <span class="cascade-hint" id="hintItem"></span>
                        </div>
                        <div class="fg">
                            <label for="inpSpec">규격</label>
                            <input type="text" id="inpSpec" list="listSpec" placeholder="예: 200L(D/M), 20L(P/L)">
                            <datalist id="listSpec"></datalist>
                        </div>
                        <div class="fg">
                            <label for="inpCategory">카테고리</label>
                            <input type="text" id="inpCategory" list="listCategory" placeholder="선택 또는 직접 입력">
                            <datalist id="listCategory">
                                <option value="유압유">
                                <option value="기어유">
                                <option value="그리스">
                                <option value="테일씰그리스">
                                <option value="절삭유">
                                <option value="기타">
                            </datalist>
                        </div>
                        <div class="fg">
                            <label for="inpMfr">제조사</label>
                            <input type="text" id="inpMfr" list="listMfr" placeholder="선택 또는 직접 입력">
                            <datalist id="listMfr"></datalist>
                            <span class="cascade-hint" id="hintMfr"></span>
                        </div>
                        <div class="fg fg-full">
                            <label for="inpSupplier">공급사</label>
                            <input type="text" id="inpSupplier" list="listSupplier" placeholder="선택 또는 직접 입력" required>
                            <datalist id="listSupplier"></datalist>
                            <span class="cascade-hint" id="hintSupplier">공급사를 선택하면 제조사/품목이 자동 필터됩니다</span>
                        </div>

                        <!-- 💰 원가 구조 -->
                        <div class="modal-section-title section-cost fg-full">💰 원가 구조</div>
                        <div class="fg">
                            <label>매입 단가</label>
                            <div class="price-input-wrap">
                                <select id="inpCurrency" class="currency-select">
                                    <option value="KRW">₩</option>
                                    <option value="USD">$</option>
                                    <option value="JPY">¥</option>
                                    <option value="EUR">€</option>
                                    <option value="CNY">¥(CN)</option>
                                </select>
                                <input type="number" id="inpBuyPrice" placeholder="0" min="0" required>
                            </div>
                        </div>
                        <div class="fg">
                            <label>부대비용 (물류/관세 등)</label>
                            <div class="price-input-wrap">
                                <span class="currency-label" id="logisticsCurrLabel">₩</span>
                                <input type="number" id="inpLogistics" placeholder="0" min="0" value="0">
                            </div>
                        </div>
                        <div class="fg">
                            <label>최종 원가 (자동계산)</label>
                            <input type="text" id="inpLandedCost" class="calc-preview" readonly placeholder="매입가 + 부대비용">
                        </div>

                        <!-- 🛒 매출 -->
                        <div class="modal-section-title section-sell fg-full">🛒 매출 단가</div>
                        <div class="fg">
                            <label>매출 단가</label>
                            <div class="price-input-wrap">
                                <span class="currency-label" id="sellCurrLabel">₩</span>
                                <input type="number" id="inpSellPrice" placeholder="0" min="0">
                            </div>
                        </div>

                        <!-- 📊 마진 미리보기 -->
                        <div class="modal-section-title section-margin fg-full">📊 마진 미리보기 (자동계산)</div>
                        <div class="fg">
                            <label>마진</label>
                            <input type="text" id="inpMarginAmt" class="calc-preview" readonly>
                        </div>
                        <div class="fg">
                            <label>마진율</label>
                            <input type="text" id="inpMarginRate" class="calc-preview" readonly>
                        </div>

                        <!-- 📝 추가 사항 -->
                        <div class="modal-section-title section-extra fg-full">📝 추가 사항</div>
                        <div class="fg fg-full">
                            <label for="inpNote">비고</label>
                            <input type="text" id="inpNote" placeholder="메모">
                        </div>
                        <div class="fg fg-full">
                            <label>단가 이력 (수정 시 자동 누적)</label>
                            <textarea id="inpHistory" rows="3" class="calc-preview" readonly></textarea>
                        </div>
                    </div>
                    <div id="timestampDisplay" style="color:var(--text-secondary); font-size:12px; margin-top:10px; text-align:right;"></div>
                    <div class="modal-footer">
                        <button type="button" class="btn-outline" id="cancelBtn">취소</button>
                        <button type="submit" class="btn-primary" id="saveBtn"><i class='bx bx-save'></i> 저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal">
        <div class="modal-content" style="max-width:420px;">
            <div class="modal-header">
                <h2 id="historyModalTitle">변동 이력</h2>
                <button type="button" class="btn-close" id="closeHistoryModalBtn"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body" id="historyModalBody" style="white-space:pre-wrap; font-size:13px; padding:10px 0; line-height:1.8;"></div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script src="../../common/js/kng-table-utils.js"></script>
    <script src="unit-prices.js"></script>
</body>
</html>
